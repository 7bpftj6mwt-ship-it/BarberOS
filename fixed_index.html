<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barba Roja Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#0D0D0D; color:white; margin:0; font-family:sans-serif;">
    <div id="root">
        <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
             <p style="color:#E4002B; font-weight:bold; letter-spacing:2px;">CARGANDO...</p>
        </div>
    </div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const RED = "#E4002B";
        const BLACK = "#0D0D0D";

        function App() {
            return (
                <div style={{ background: "#F5F5F5", minHeight: "100vh", padding: 20, color: "#333", textAlign: "center" }}>
                    <div style={{ background: BLACK, color: "#fff", padding: 20, borderRadius: 10, marginBottom: 20 }}>
                        <h1 style={{ margin: 0 }}>BARBEROS</h1>
                        <p style={{ margin: 0, color: "#aaa" }}>SANTA FE · PILOTO</p>
                    </div>
                    <div style={{ background: "#fff", padding: 40, borderRadius: 10, border: "1px solid #ddd" }}>
                        <h2 style={{ color: RED }}>¡SISTEMA LISTO!</h2>
                        <p>Hola Gonzalo. Tu agenda ya está online.</p>
                        <button style={{ marginTop: 20, width: "100%", background: BLACK, color: "#fff", border: "none", padding: 15, borderRadius: 8, fontWeight: "bold" }}>
                            ENTRAR A LA AGENDA
                        </button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
