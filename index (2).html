<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Barba Roja Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #0D0D0D; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; color: black; padding: 40px; border-radius: 15px; text-align: center; }
        button { background: #E4002B; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return (
                <div className="card">
                    <h1 style={{color: '#E4002B'}}>BARBA ROJA</h1>
                    <p>¡El sistema está funcionando correctamente!</p>
                    <button onClick={() => alert('¡Listo para empezar!')}>ENTRAR A LA AGENDA</button>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
