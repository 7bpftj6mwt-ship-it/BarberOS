<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>BarberOS - Barba Roja</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap' rel='stylesheet'>
    <style>
        body { background-color: #0D0D0D; color: white; font-family: 'Lato', sans-serif; margin: 0; padding-bottom: 80px; }
        .bg-card { background-color: #1A1A1A; border: 1px solid #333; }
        .btn-primary { background-color: #E4002B; color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); background-color: #b30021; }
        input, select { background: #262626 !important; color: white !important; border: 1px solid #444 !important; border-radius: 8px !important; padding: 10px !important; width: 100%; }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('agenda');
            const [barberos, setBarberos] = useState(() => JSON.parse(localStorage.getItem('barberOS_barberos')) || ['Gonzalo', 'Barbero 2']);
            const [precios, setPrecios] = useState(() => JSON.parse(localStorage.getItem('barberOS_precios')) || { 'Corte': 5000, 'Barba': 3000, 'Combo': 7000 });
            const [turnos, setTurnos] = useState(() => JSON.parse(localStorage.getItem('barberOS_turnos')) || []);
            const [clientes, setClientes] = useState(() => JSON.parse(localStorage.getItem('barberOS_clientes')) || []);

            useEffect(() => localStorage.setItem('barberOS_barberos', JSON.stringify(barberos)), [barberos]);
            useEffect(() => localStorage.setItem('barberOS_precios', JSON.stringify(precios)), [precios]);
            useEffect(() => localStorage.setItem('barberOS_turnos', JSON.stringify(turnos)), [turnos]);
            useEffect(() => localStorage.setItem('barberOS_clientes', JSON.stringify(clientes)), [clientes]);

            const [nuevoTurno, setNuevoTurno] = useState({ cliente: '', barbero: barberos[0], servicio: 'Corte', fecha: '', hora: '' });

            const agregarTurno = (e) => {
                e.preventDefault();
                if (!nuevoTurno.cliente || !nuevoTurno.fecha || !nuevoTurno.hora) return alert('Completá todos los datos');
                setTurnos([...turnos, { ...nuevoTurno, id: Date.now() }]);
                if (!clientes.includes(nuevoTurno.cliente)) setClientes([...clientes, nuevoTurno.cliente]);
                setNuevoTurno({ ...nuevoTurno, cliente: '', fecha: '', hora: '' });
                alert('Turno agendado!');
            };

            const borrarTurno = (id) => setTurnos(turnos.filter(t => t.id !== id));

            const [nuevoNombreBarbero, setNuevoNombreBarbero] = useState('');
            const agregarBarbero = () => {
                if (nuevoNombreBarbero) {
                    setBarberos([...barberos, nuevoNombreBarbero]);
                    setNuevoNombreBarbero('');
                }
            };

            const actualizarPrecio = (servicio, valor) => {
                setPrecios({ ...precios, [servicio]: Number(valor) });
            };

            return (
                <div className='max-w-md mx-auto p-4'>
                    <header className='flex items-center gap-4 mb-6 pt-4'>
                        <div className='w-12 h-12 bg-[#E4002B] rounded-full flex items-center justify-center font-black text-xl italic text-black'>BR</div>
                        <div>
                            <h1 className='font-black text-2xl tracking-tighter uppercase'>BarberOS</h1>
                            <p className='text-[10px] text-gray-500 font-bold uppercase tracking-widest'>Barba Roja · Santa Fe</p>
                        </div>
                    </header>

                    {view === 'agenda' && (
                        <div className='space-y-6'>
                            <form onSubmit={agregarTurno} className='bg-card p-4 rounded-xl space-y-4'>
                                <h2 className='text-[#E4002B] font-black italic'>NUEVO TURNO</h2>
                                <input placeholder='Nombre del Cliente' value={nuevoTurno.cliente} onChange={e => setNuevoTurno({...nuevoTurno, cliente: e.target.value})} />
                                <div className='grid grid-cols-2 gap-2'>
                                    <input type='date' value={nuevoTurno.fecha} onChange={e => setNuevoTurno({...nuevoTurno, fecha: e.target.value})} />
                                    <input type='time' value={nuevoTurno.hora} onChange={e => setNuevoTurno({...nuevoTurno, hora: e.target.value})} />
                                </div>
                                <select value={nuevoTurno.barbero} onChange={e => setNuevoTurno({...nuevoTurno, barbero: e.target.value})}>
                                    {barberos.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <select value={nuevoTurno.servicio} onChange={e => setNuevoTurno({...nuevoTurno, servicio: e.target.value})}>
                                    {Object.keys(precios).map(s => <option key={s} value={s}>{s} ()</option>)}
                                </select>
                                <button type='submit' className='btn-primary w-full py-3 rounded-xl font-black italic text-lg shadow-lg'>AGENDAR TURNO</button>
                            </form>

                            <div className='space-y-4'>
                                <h2 className='font-black italic text-gray-400'>TURNOS PENDIENTES</h2>
                                {turnos.length === 0 && <p className='text-gray-600 text-center py-4'>No hay turnos agendados</p>}
                                {[...turnos].sort((a,b) => a.fecha.localeCompare(b.fecha)).map(t => (
                                    <div key={t.id} className='bg-card p-3 rounded-xl flex justify-between items-center border-l-4 border-[#E4002B]'>
                                        <div>
                                            <div className='font-black uppercase text-sm'>{t.cliente}</div>
                                            <div className='text-xs text-gray-400'>{t.fecha} - {t.hora} | {t.barbero}</div>
                                            <div className='text-[10px] text-[#E4002B] font-bold'>{t.servicio}</div>
                                        </div>
                                        <button onClick={() => borrarTurno(t.id)} className='text-gray-600 p-2'>✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'config' && (
                        <div className='space-y-8 pb-10'>
                            <section className='bg-card p-4 rounded-xl space-y-4'>
                                <h2 className='text-[#E4002B] font-black italic'>GESTIÓN DE BARBEROS</h2>
                                <div className='flex gap-2'>
                                    <input className='flex-1' placeholder='Nuevo Barbero' value={nuevoNombreBarbero} onChange={e => setNuevoNombreBarbero(e.target.value)} />
                                    <button onClick={agregarBarbero} className='btn-primary px-4 rounded-lg font-bold'>+</button>
                                </div>
                                <div className='flex flex-wrap gap-2 pt-2'>
                                    {barberos.map(b => (
                                        <span key={b} className='bg-[#262626] px-3 py-1 rounded-full text-xs font-bold border border-[#444]'>{b}</span>
                                    ))}
                                </div>
                            </section>

                            <section className='bg-card p-4 rounded-xl space-y-4'>
                                <h2 className='text-[#E4002B] font-black italic'>LISTA DE PRECIOS</h2>
                                {Object.keys(precios).map(s => (
                                    <div key={s} className='flex items-center justify-between gap-4'>
                                        <label className='text-sm font-bold text-gray-400'>{s}</label>
                                        <div className='flex items-center gap-2'>
                                            <span className='text-gray-500'>$</span>
                                            <input type='number' className='w-24 text-right' value={precios[s]} onChange={e => actualizarPrecio(s, e.target.value)} />
                                        </div>
                                    </div>
                                ))}
                            </section>
                        </div>
                    )}

                    <nav className='fixed bottom-0 left-0 right-0 bg-[#0D0D0D] border-t border-[#333] p-4 flex justify-around items-center z-50'>
                        <button onClick={() => setView('agenda')} className={'flex flex-col items-center ' + (view === 'agenda' ? 'text-[#E4002B]' : 'text-gray-500')}>
                            <span className='text-xl'>📅</span>
                            <span className='text-[10px] font-bold uppercase'>Agenda</span>
                        </button>
                        <button onClick={() => setView('config')} className={'flex flex-col items-center ' + (view === 'config' ? 'text-[#E4002B]' : 'text-gray-500')}>
                            <span className='text-xl'>⚙️</span>
                            <span className='text-[10px] font-bold uppercase'>Config</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
