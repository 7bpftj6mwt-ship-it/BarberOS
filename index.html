<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Barba Roja - Gestión Total</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: #ef4444; color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); background: #dc2626; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: #94a3b8; }
        .nav-item.active { color: #ef4444; }
        .slot { border-bottom: 1px solid #334155; padding: 1rem 0; display: flex; align-items: center; }
        .slot:last-child { border: none; }
        input, select { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; border-radius: 0.5rem !important; }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('agenda');
            const [barberoActivo, setBarberoActivo] = useState('Gonzalo');
            const [clientes, setClientes] = useState(() => JSON.parse(localStorage.getItem('br_clientes')) || []);
            const [turnos, setTurnos] = useState(() => JSON.parse(localStorage.getItem('br_turnos')) || {});
            const [precios, setPrecios] = useState(() => JSON.parse(localStorage.getItem('br_precios')) || { 'Corte': 18000, 'Barba': 8000, 'Combo': 22000, 'Color': 75000 });
            
            useEffect(() => { localStorage.setItem('br_clientes', JSON.stringify(clientes)); }, [clientes]);
            useEffect(() => { localStorage.setItem('br_turnos', JSON.stringify(turnos)); }, [turnos]);

            const horarios = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30"];

            const addCliente = (e) => {
                e.preventDefault();
                const nuevo = { id: Date.now(), nombre: e.target.nombre.value, tel: e.target.tel.value, ig: e.target.ig.value };
                setClientes([...clientes, nuevo]);
                e.target.reset();
                alert('Cliente guardado!');
            };

            const agendar = (hora, clienteNombre, servicio) => {
                const key = `${barberoActivo}-${hora}`;
                setTurnos({ ...turnos, [key]: { nombre: clienteNombre, servicio, precio: precios[servicio] || 0, pago: 'Pendiente' } });
            };

            return (
                <div className="max-w-md mx-auto pb-24 min-h-screen">
                    <header className="p-6 bg-slate-900 sticky top-0 z-10 border-b border-slate-800">
                        <h1 className="text-2xl font-bold text-red-500">Barba Roja PRO</h1>
                        <div className="flex gap-2 mt-4">
                            {['Gonzalo', 'Pablo'].map(b => (
                                <button key={b} onClick={() => setBarberoActivo(b)} className={`flex-1 py-2 rounded-lg text-sm font-semibold ${barberoActivo === b ? 'bg-red-500 text-white' : 'bg-slate-800 text-slate-400'}`}>
                                    {b}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-4">
                        {tab === 'agenda' && (
                            <div className="card p-4">
                                <h2 className="text-lg font-bold mb-4">Turnos de Hoy</h2>
                                {horarios.map(hora => {
                                    const turno = turnos[`${barberoActivo}-${hora}`];
                                    return (
                                        <div key={hora} className="slot">
                                            <div className="w-16 font-bold text-slate-400">{hora}</div>
                                            <div className="flex-1 px-2">
                                                {turno ? (
                                                    <div className="bg-red-500/20 border border-red-500/50 p-2 rounded">
                                                        <p className="font-bold text-red-400">{turno.nombre}</p>
                                                        <p className="text-xs text-slate-300">{turno.servicio} - ${turno.precio}</p>
                                                    </div>
                                                ) : (
                                                    <select 
                                                        className="w-full p-1 text-sm rounded bg-slate-700 border-none"
                                                        onChange={(e) => {
                                                            const parts = e.target.value.split('|');
                                                            if(parts.length === 2) agendar(hora, parts[0], parts[1]);
                                                        }}
                                                        value=""
                                                    >
                                                        <option value="">Disponible...</option>
                                                        {clientes.map(c => (
                                                            <optgroup key={c.id} label={c.nombre}>
                                                                {Object.keys(precios).map(s => <option key={s} value={`${c.nombre}|${s}`}>{s}</option>)}
                                                            </optgroup>
                                                        ))}
                                                    </select>
                                                )}
                                            </div>
                                            {turno && <button onClick={() => {
                                                const newTurnos = {...turnos};
                                                delete newTurnos[`${barberoActivo}-${hora}`];
                                                setTurnos(newTurnos);
                                            }} className="text-slate-500 text-xs">Borrar</button>}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === 'clientes' && (
                            <div className="space-y-4">
                                <form onSubmit={addCliente} className="card p-4 space-y-3">
                                    <h2 className="text-lg font-bold">Nuevo Cliente</h2>
                                    <input name="nombre" placeholder="Nombre completo" className="w-full p-2" required />
                                    <input name="tel" placeholder="WhatsApp" className="w-full p-2" />
                                    <input name="ig" placeholder="@Instagram" className="w-full p-2" />
                                    <button className="btn-primary w-full">Guardar Cliente</button>
                                </form>
                                <div className="card p-4">
                                    <h2 className="text-lg font-bold mb-3">Lista de Clientes ({clientes.length})</h2>
                                    <div className="divide-y divide-slate-700">
                                        {clientes.map(c => (
                                            <div key={c.id} className="py-2 flex justify-between items-center">
                                                <div>
                                                    <p className="font-semibold">{c.nombre}</p>
                                                    <p className="text-xs text-slate-400">{c.tel} | {c.ig}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'caja' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="card p-4 text-center">
                                        <p className="text-xs text-slate-400">Hoy ({barberoActivo})</p>
                                        <p className="text-xl font-bold text-green-400">
                                            ${Object.entries(turnos)
                                                .filter(([key]) => key.startsWith(barberoActivo))
                                                .reduce((acc, [_, t]) => acc + (t.precio || 0), 0)}
                                        </p>
                                    </div>
                                    <div className="card p-4 text-center">
                                        <p className="text-xs text-slate-400">Total General</p>
                                        <p className="text-xl font-bold text-blue-400">
                                            ${Object.values(turnos).reduce((acc, t) => acc + (t.precio || 0), 0)}
                                        </p>
                                    </div>
                                </div>
                                <div className="card p-4">
                                    <h2 className="text-lg font-bold mb-3">Precios Servicios</h2>
                                    {Object.entries(precios).map(([s, p]) => (
                                        <div key={s} className="flex justify-between py-2 border-b border-slate-700 last:border-0">
                                            <span>{s}</span>
                                            <span className="font-bold text-red-400">${p}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-3 pb-6">
                        <button onClick={() => setTab('agenda')} className={`nav-item ${tab === 'agenda' ? 'active' : ''}`}>
                            <span className="text-xl">📅</span>
                            <span>Agenda</span>
                        </button>
                        <button onClick={() => setTab('clientes')} className={`nav-item ${tab === 'clientes' ? 'active' : ''}`}>
                            <span className="text-xl">👥</span>
                            <span>Clientes</span>
                        </button>
                        <button onClick={() => setTab('caja')} className={`nav-item ${tab === 'caja' ? 'active' : ''}`}>
                            <span className="text-xl">💰</span>
                            <span>Caja</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
