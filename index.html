<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>BarberOS Pro - Gestión</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap' rel='stylesheet'>
    <style>
        :root { --accent: #E4002B; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 16px; }
        .btn-accent { background: var(--accent); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; color: #555; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); }
        .slot { border-radius: 8px; padding: 10px; font-size: 12px; font-weight: 900; text-align: center; background: #1a1a1a; color: #666; border: 1px solid #333; }
        .slot.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
        .slot.occupied { background: #221111; color: #442222; text-decoration: line-through; pointer-events: none; border-color: #331111; }
        input, select, textarea { background: #1a1a1a !important; color: #fff !important; border: 1px solid #333 !important; padding: 12px !important; border-radius: 10px !important; width: 100%; outline: none; }
        .stat-card { background: linear-gradient(145deg, #111, #0a0a0a); border: 1px solid #222; border-radius: 16px; padding: 16px; }
        .tab-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('agenda');
            const [turnos, setTurnos] = useState(() => JSON.parse(localStorage.getItem('barberos_turnos')) || []);
            const [barberos, setBarberos] = useState(() => JSON.parse(localStorage.getItem('barberos_staff')) || ['Gonzalo Lavi', 'Pablo Lisandro']);
            const [servicios, setServicios] = useState(() => JSON.parse(localStorage.getItem('barberos_servicios')) || [
                { nombre: 'Corte', precio: 18000 },
                { nombre: 'Barba', precio: 8000 },
                { nombre: 'Corte + Barba', precio: 22000 },
                { nombre: 'Colores', precio: 75000 }
            ]);

            useEffect(() => { localStorage.setItem('barberos_turnos', JSON.stringify(turnos)); }, [turnos]);
            useEffect(() => { localStorage.setItem('barberos_staff', JSON.stringify(barberos)); }, [barberos]);
            useEffect(() => { localStorage.setItem('barberos_servicios', JSON.stringify(servicios)); }, [servicios]);

            const [form, setForm] = useState({ cliente: '', barbero: barberos[0], servicio: servicios[0].nombre, fecha: new Date().toISOString().split('T')[0], hora: '' });

            const slots = ['09:00','09:30','10:00','10:30','11:00','11:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'];

            const agendar = (e) => {
                e.preventDefault();
                if (!form.cliente || !form.hora) return alert('Por favor, completa el nombre del cliente y elige una hora.');
                const precio = servicios.find(s => s.nombre === form.servicio).precio;
                const nuevoTurno = { ...form, id: Date.now(), monto: precio };
                setTurnos([...turnos, nuevoTurno]);
                setForm({ ...form, cliente: '', hora: '' });
                alert('¡Turno agendado con éxito!');
            };

            const calcularStats = () => {
                const hoy = new Date().toISOString().split('T')[0];
                const ahora = new Date();
                const inicioSemana = new Date(ahora.setDate(ahora.getDate() - ahora.getDay())).toISOString().split('T')[0];
                const mesActual = hoy.substring(0, 7);

                const tHoy = turnos.filter(t => t.fecha === hoy);
                const tSemana = turnos.filter(t => t.fecha >= inicioSemana);
                const tMes = turnos.filter(t => t.fecha.startsWith(mesActual));

                return {
                    hoy: { total: tHoy.reduce((a, b) => a + b.monto, 0), cant: tHoy.length },
                    semana: { total: tSemana.reduce((a, b) => a + b.monto, 0), cant: tSemana.length },
                    mes: { total: tMes.reduce((a, b) => a + b.monto, 0), cant: tMes.length }
                };
            };

            const stats = calcularStats();

            return (
                <div className='max-w-md mx-auto p-4 pb-20'>
                    <header className='mb-8 flex justify-between items-center'>
                        <div>
                            <h1 className='text-3xl font-black italic tracking-tighter'>BARBER<span className='text-[var(--accent)]'>OS</span></h1>
                            <p className='text-[10px] font-bold text-gray-500 uppercase tracking-widest'>Sistema de Gestión Pro</p>
                        </div>
                        <div className='text-right'>
                            <p className='text-xs font-bold text-gray-400'>CAJA HOY</p>
                            <p className='text-xl font-black text-[var(--accent)]'>${stats.hoy.total.toLocaleString()}</p>
                        </div>
                    </header>

                    {tab === 'agenda' && (
                        <div className='tab-content space-y-6'>
                            <form onSubmit={agendar} className='card space-y-4 shadow-2xl'>
                                <h2 className='text-sm font-black text-[var(--accent)] uppercase italic'>Nuevo Turno</h2>
                                <input placeholder='Nombre del Cliente' value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} required />
                                <div className='grid grid-cols-2 gap-3'>
                                    <input type='date' value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                    <select value={form.barbero} onChange={e => setForm({...form, barbero: e.target.value})}>
                                        {barberos.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                                <select value={form.servicio} onChange={e => setForm({...form, servicio: e.target.value})}>
                                    {servicios.map(s => <option key={s.nombre} value={s.nombre}>{s.nombre} (${s.precio.toLocaleString()})</option>)}
                                </select>
                                <div className='grid grid-cols-4 gap-2'>
                                    {slots.map(h => {
                                        const ocupado = turnos.some(t => t.fecha === form.fecha && t.hora === h && t.barbero === form.barbero);
                                        return (
                                            <button 
                                                key={h} 
                                                type='button' 
                                                onClick={() => setForm({...form, hora: h})}
                                                className={`slot ${ocupado ? 'occupied' : (form.hora === h ? 'selected' : '')}`}
                                            >{h}</button>
                                        );
                                    })}
                                </div>
                                <button type='submit' className='btn-accent shadow-lg shadow-red-900/20'>Agendar Turno</button>
                            </form>

                            <div className='space-y-3'>
                                <h2 className='text-[10px] font-black text-gray-500 uppercase tracking-widest px-2'>Agenda del Día</h2>
                                {turnos.filter(t => t.fecha === form.fecha).sort((a,b) => a.hora.localeCompare(b.hora)).length === 0 ? (
                                    <p className='text-center text-gray-600 text-sm py-4'>No hay turnos para este día.</p>
                                ) : (
                                    turnos.filter(t => t.fecha === form.fecha).sort((a,b) => a.hora.localeCompare(b.hora)).map(t => (
                                        <div key={t.id} className='card flex justify-between items-center border-l-4 border-[var(--accent)]'>
                                            <div>
                                                <p className='font-black text-sm uppercase'>{t.cliente}</p>
                                                <p className='text-[10px] text-gray-400 font-bold'>{t.hora} | {t.barbero} | {t.servicio}</p>
                                            </div>
                                            <button onClick={() => {if(confirm('¿Eliminar turno?')) setTurnos(turnos.filter(x => x.id !== t.id))}} className='text-gray-700 hover:text-red-500'>
                                                <svg className='w-5 h-5' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path strokeLinecap='round' strokeLinejoin='round' strokeWidth='2' d='M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16'></path></svg>
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {tab === 'caja' && (
                        <div className='tab-content space-y-4'>
                            <div className='grid grid-cols-1 gap-4'>
                                <div className='stat-card flex justify-between items-center'>
                                    <div><p className='text-gray-500 text-[10px] font-black uppercase tracking-widest'>Ganancia Hoy</p><p className='text-3xl font-black text-[var(--accent)]'>${stats.hoy.total.toLocaleString()}</p></div>
                                    <div className='text-right'><p className='text-gray-500 text-[10px] font-black uppercase'>Cortes</p><p className='text-xl font-black'>{stats.hoy.cant}</p></div>
                                </div>
                                <div className='stat-card flex justify-between items-center'>
                                    <div><p className='text-gray-500 text-[10px] font-black uppercase tracking-widest'>Semana</p><p className='text-3xl font-black'>${stats.semana.total.toLocaleString()}</p></div>
                                    <div className='text-right'><p className='text-gray-500 text-[10px] font-black uppercase'>Cortes</p><p className='text-xl font-black'>{stats.semana.cant}</p></div>
                                </div>
                                <div className='stat-card flex justify-between items-center'>
                                    <div><p className='text-gray-500 text-[10px] font-black uppercase tracking-widest'>Mes</p><p className='text-3xl font-black'>${stats.mes.total.toLocaleString()}</p></div>
                                    <div className='text-right'><p className='text-gray-500 text-[10px] font-black uppercase'>Cortes</p><p className='text-xl font-black'>{stats.mes.cant}</p></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'ajustes' && (
                        <div className='tab-content space-y-6'>
                            <div className='card space-y-4'>
                                <h2 className='text-sm font-black text-[var(--accent)] uppercase italic'>Precios de Servicios</h2>
                                {servicios.map((s, idx) => (
                                    <div key={idx} className='flex gap-3 items-center'>
                                        <input className='!text-xs' value={s.nombre} onChange={e => {
                                            const ns = [...servicios]; ns[idx].nombre = e.target.value; setServicios(ns);
                                        }} />
                                        <input type='number' className='!w-28 text-right' value={s.precio} onChange={e => {
                                            const ns = [...servicios]; ns[idx].precio = Number(e.target.value); setServicios(ns);
                                        }} />
                                    </div>
                                ))}
                                <button onClick={() => setServicios([...servicios, { nombre: 'Nuevo Servicio', precio: 0 }])} className='text-xs font-bold text-gray-500 uppercase'>+ Agregar Servicio</button>
                            </div>

                            <div className='card space-y-4'>
                                <h2 className='text-sm font-black text-[var(--accent)] uppercase italic'>Equipo de Barberos</h2>
                                {barberos.map((b, idx) => (
                                    <div key={idx} className='flex gap-3 items-center'>
                                        <input value={b} onChange={e => {
                                            const nb = [...barberos]; nb[idx] = e.target.value; setBarberos(nb);
                                        }} />
                                        <button onClick={() => setBarberos(barberos.filter((_, i) => i !== idx))} className='text-red-900'>✖</button>
                                    </div>
                                ))}
                                <button onClick={() => setBarberos([...barberos, 'Nuevo Barbero'])} className='text-xs font-bold text-gray-500 uppercase'>+ Agregar Barbero</button>
                            </div>
                        </div>
                    )}

                    <nav className='fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-md border-t border-gray-900 p-4 flex justify-around z-50'>
                        <button onClick={() => setTab('agenda')} className={`nav-btn ${tab === 'agenda' ? 'active' : ''}`}><span className='text-xl mb-1'>📅</span><span>Agenda</span></button>
                        <button onClick={() => setTab('caja')} className={`nav-btn ${tab === 'caja' ? 'active' : ''}`}><span className='text-xl mb-1'>💰</span><span>Caja</span></button>
                        <button onClick={() => setTab('ajustes')} className={`nav-btn ${tab === 'ajustes' ? 'active' : ''}`}><span className='text-xl mb-1'>⚙️</span><span>Ajustes</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
