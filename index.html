<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        body { background-color: #0D0D0D; color: white; font-family: 'Lato', sans-serif; margin: 0; overflow-x: hidden; }

</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useMemo, useEffect } = React;

        
        


const LayoutDashboard = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>📊</span>;
const Calendar = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>📅</span>;
const Users = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>👤</span>;
const Scissors = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>✂️</span>;
const Plus = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>＋</span>;
const X = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>✕</span>;
const Clock = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>🕒</span>;
const Trash2 = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>🗑️</span>;
const ChevronLeft = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>‹</span>;
const ChevronRight = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>›</span>;
const Instagram = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>📷</span>;
const Cake = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>🎂</span>;
const TrendingUp = (p) => <span style={{fontSize:(p.size||16), lineHeight:1, color:p.color}}>📈</span>;
const ShoppingBag = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>🛍️</span>;
const Edit2 = (p) => <span style={{fontSize:(p.size||16), lineHeight:1}}>✏️</span>;

const RED = "#E4002B";
const RED_DEEP = "#8C0021";
const BLACK = "#0D0D0D";
const GRAY = "#4A4A4A";
const GRAY_LIGHT = "#B5B5B5";

const uid = () => Math.random().toString(36).slice(2, 9);
const todayISO = () => new Date().toISOString().slice(0, 10);
const money = (n) => `$${(n || 0).toLocaleString("es-AR")}`;

function Shield({ size = 24, color = RED, trace = "#fff" }) {
return (
    <svg width={size} height={size} viewBox="0 0 240 240">
      <polygon points="90,30 150,30 185,55 195,100 175,150 145,195 120,225 95,195 65,150 45,100 55,55" fill={color} />
      <path d="M 55,92 L 100,92 L 115,107 L 125,107 L 140,92 L 185,92" fill="none" stroke={trace} strokeWidth="9" strokeLinecap="square" />
      <rect x="113" y="100" width="14" height="14" fill={trace} />
    </svg>
);
}

// ---- Horarios: Martes a Sábado, mañana 09:00-11:30 y tarde 14:00-20:30, turnos de 30 min ----
function buildSlots(startH, startM, endH, endM) {
const slots = [];
let h = startH, m = startM;
while (h < endH || (h === endH && m <= endM)) {
    slots.push(`${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`);
    m += 30;
    if (m >= 60) { m -= 60; h += 1; }
}
return slots;
}
const SLOTS = [...buildSlots(9, 0, 11, 30), ...buildSlots(14, 0, 20, 30)];
const slotIndex = (t) => SLOTS.indexOf(t);

const PAYMENT_METHODS = ["Efectivo", "Transferencia", "Mercado Pago", "Tarjeta"];

const initialBarbers = [
{ id: "b1", name: "Gonzalo Lavi" },
{ id: "b2", name: "Pablo Lisandron" },
];
// Días de trabajo: martes(2) a sábado(6). Domingo(0) y lunes(1) cerrado.
function isWorkingDay(dateStr) {
const day = new Date(dateStr + "T00:00:00").getDay();
return day >= 2 && day <= 6;
}
function nextWorkingDay(dateStr, dir) {
let d = addDays(dateStr, dir);
while (!isWorkingDay(d)) d = addDays(d, dir);
return d;
}
const initialServices = [
{ id: "s1", name: "Corte", price: 18000, duration: 30 },
{ id: "s2", name: "Barba", price: 8000, duration: 30 },
{ id: "s3", name: "Corte + Barba", price: 22000, duration: 60 },
{ id: "s4", name: "Colores", price: 75000, duration: null },
];
const initialClients = [
{ id: "c1", name: "Marcos Lima", phone: "11-5555-0101", instagram: "@marcoslima", birthday: "1994-03-12" },
{ id: "c2", name: "Julián Peña", phone: "11-5555-0102", instagram: "@julipeña", birthday: "1990-07-02" },
];
const initialAppointments = [
{ id: uid(), barberId: "b1", clientId: "c1", serviceId: "s3", date: todayISO(), time: "10:00", duration: 60, estado: "Confirmado", pago: "Efectivo", obs: "" },
{ id: uid(), barberId: "b2", clientId: "c2", serviceId: "s1", date: todayISO(), time: "14:30", duration: 30, estado: "Pendiente", pago: null, obs: "Prefiere máquina, no tijera" },
];

const initialProductos = [
{ id: "p1", name: "Pomada fijadora", price: 9500 },
{ id: "p2", name: "Aceite para barba", price: 7500 },
{ id: "p3", name: "Shampoo anticaspa", price: 6000 },
{ id: "p4", name: "Cera mate", price: 8000 },
];

function fmtDate(d) {
return new Date(d + "T00:00:00").toLocaleDateString("es-AR", { weekday: "long", day: "2-digit", month: "long" });
}
function addDays(dateStr, n) {
const d = new Date(dateStr + "T00:00:00");
d.setDate(d.getDate() + n);
return d.toISOString().slice(0, 10);
}
function startOfWeek(dateStr) {
const d = new Date(dateStr + "T00:00:00");
const day = (d.getDay() + 6) % 7;
d.setDate(d.getDate() - day);
return d.toISOString().slice(0, 10);
}

const load = (key, def) => {
  try {
    const data = localStorage.getItem('barba_roja_' + key);
    return data ? JSON.parse(data) : def;
  } catch (e) { return def; }
};


function App() {
    const load = (k, d) => {
        try {
            const data = localStorage.getItem('br_v20_' + k);
            return data ? JSON.parse(data) : d;
        } catch(e) { return d; }
    };

    useEffect(() => { localStorage.setItem('br_v20_clients', JSON.stringify(clients)); }, [clients]);
    useEffect(() => { localStorage.setItem('br_v20_appointments', JSON.stringify(appointments)); }, [appointments]);
    useEffect(() => { localStorage.setItem('br_v20_productos', JSON.stringify(productos)); }, [productos]);
    useEffect(() => { localStorage.setItem('br_v20_ventas', JSON.stringify(ventas)); }, [ventas]);

const [tab, setTab] = useState("dashboard");
const [barbers] = useState(initialBarbers);
const [services, setServices] = useState(() => load('services', initialServices));
const [clients, setClients] = useState(() => load('clients', initialClients));
const [appointments, setAppointments] = useState(() => load('appointments', initialAppointments));
const [productos, setProductos] = useState(() => load('productos', initialProductos));
const [ventas, setVentas] = useState(() => load('ventas', []));

useEffect(() => {
  localStorage.setItem('barba_roja_services', JSON.stringify(services));
}, [services]);

useEffect(() => {
  localStorage.setItem('barba_roja_clients', JSON.stringify(clients));
}, [clients]);

useEffect(() => {
  localStorage.setItem('barba_roja_appointments', JSON.stringify(appointments));
}, [appointments]);

useEffect(() => {
  localStorage.setItem('barba_roja_productos', JSON.stringify(productos));
}, [productos]);

useEffect(() => {
  localStorage.setItem('barba_roja_ventas', JSON.stringify(ventas));
}, [ventas]);

const [modal, setModal] = useState(null);
const [agendaDate, setAgendaDate] = useState(() => (isWorkingDay(todayISO()) ? todayISO() : nextWorkingDay(todayISO(), 1)));
const [agendaBarberId, setAgendaBarberId] = useState(initialBarbers[0].id);

const today = todayISO();

const withNames = useMemo(
    () =>
      appointments.map((a) => ({
        ...a,
        barber: barbers.find((b) => b.id === a.barberId),
        client: clients.find((c) => c.id === a.clientId),
        service: services.find((s) => s.id === a.serviceId),
      })),
    [appointments, barbers, clients, services]
);

const clientsWithStats = useMemo(() => {
    return clients.map((c) => {
      const historial = withNames.filter((a) => a.clientId === c.id && a.estado === "Confirmado").sort((a, b) => (a.date + a.time < b.date + b.time ? 1 : -1));
      return {
        ...c,
        historial,
        visitas: historial.length,
        ultimaVisita: historial[0]?.date || null,
        totalGastado: historial.reduce((acc, a) => acc + (a.service?.price || 0), 0),
      };
    });
}, [clients, withNames]);

const stats = useMemo(() => {
    const confirmados = withNames.filter((a) => a.estado === "Confirmado");
    const sow = startOfWeek(today);
    const monthPrefix = today.slice(0, 7);
    const inRange = (list, pred) => list.filter(pred);

    const day = inRange(confirmados, (a) => a.date === today);
    const week = inRange(confirmados, (a) => a.date >= sow && a.date <= today);
    const month = inRange(confirmados, (a) => a.date.startsWith(monthPrefix));

    const sum = (l) => l.reduce((acc, a) => acc + (a.service?.price || 0), 0);

    const porServicio = {};
    month.forEach((a) => {
      const key = a.service?.name || "—";
      porServicio[key] = (porServicio[key] || 0) + 1;
    });
    const serviciosMasVendidos = Object.entries(porServicio).sort((a, b) => b[1] - a[1]);

    const porPago = {};
    PAYMENT_METHODS.forEach((m) => (porPago[m] = 0));
    month.forEach((a) => {
      if (a.pago) porPago[a.pago] = (porPago[a.pago] || 0) + (a.service?.price || 0);
    });

    // Ventas de productos hoy
    const ventasHoy = ventas.filter((v) => v.date === today);
    const totalVentasHoy = ventasHoy.reduce((acc, v) => acc + v.total, 0);

    return {
      day: { total: sum(day), count: day.length },
      week: { total: sum(week), count: week.length },
      month: { total: sum(month), count: month.length },
      serviciosMasVendidos,
      porPago,
      ventasHoy: { total: totalVentasHoy, count: ventasHoy.length },
    };
}, [withNames, today, ventas]);

function openQuickBooking() {
    const date = isWorkingDay(today) ? today : nextWorkingDay(today, 1);
    const barberId = agendaBarberId;
    const busy = new Set();
    withNames
      .filter((a) => a.date === date && a.barberId === barberId && a.estado !== "Cancelado")
      .forEach((a) => occupiedSlots(a).forEach((idx) => busy.add(idx)));
    const freeIdx = SLOTS.findIndex((_, idx) => !busy.has(idx));
    const time = freeIdx >= 0 ? SLOTS[freeIdx] : SLOTS[0];
    setModal({ type: "cita", date, barberId, time });
}

function updateEstado(id, estado, pago) {
    setAppointments((prev) => prev.map((a) => (a.id === id ? { ...a, estado, pago: pago ?? a.pago } : a)));
}
function deleteAppointment(id) {
    setAppointments((prev) => prev.filter((a) => a.id !== id));
}

return (
    <div style={{ fontFamily: "'Lato', sans-serif", background: "#F5F5F5", minHeight: "100vh", maxWidth: 480, margin: "0 auto", position: "relative", boxShadow: "0 0 40px rgba(0,0,0,0.15)" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap');
        * { box-sizing: border-box; }
        button { font-family: inherit; cursor: pointer; }
        input, select, textarea { font-family: inherit; }
      `}</style>

      <div style={{ background: BLACK, color: "#fff", padding: "20px 20px 14px", display: "flex", alignItems: "center", gap: 12 }}>
        <Shield size={32} />
        <div>
          <div style={{ fontWeight: 900, fontSize: 17, letterSpacing: 0.5 }}>BARBEROS</div>
          <div style={{ fontWeight: 300, fontSize: 10.5, letterSpacing: 3, color: GRAY_LIGHT }}>BARBA ROJA · PILOTO V1</div>
        </div>
      </div>
      <div style={{ height: 5, background: `linear-gradient(90deg, ${RED} 0%, ${RED} 60%, ${RED_DEEP} 100%)` }} />

      <div style={{ padding: "18px 16px 90px" }}>
        {tab === "dashboard" && <DashboardView stats={stats} />}
        {tab === "agenda" && (
          <AgendaView
            barbers={barbers}
            withNames={withNames}
            agendaDate={agendaDate}
            setAgendaDate={setAgendaDate}
            agendaBarberId={agendaBarberId}
            setAgendaBarberId={setAgendaBarberId}
            onSlotClick={(time) => setModal({ type: "cita", date: agendaDate, barberId: agendaBarberId, time })}
            onOpenCita={(a) => setModal({ type: "detalle", cita: a })}
          />
        )}
        {tab === "clientes" && <ClientesView clients={clientsWithStats} onAdd={() => setModal({ type: "cliente" })} />}
        {tab === "servicios" && (
          <ServiciosView
            services={services}
            onAdd={() => setModal({ type: "servicio" })}
            onDelete={(id) => setServices((prev) => prev.filter((s) => s.id !== id))}
          />
        )}
        {tab === "ventas" && (
          <VentasView
            productos={productos}
            ventas={ventas}
            onNuevaVenta={() => setModal({ type: "venta" })}
            onNuevoProducto={() => setModal({ type: "producto" })}
            onDeleteVenta={(id) => setVentas((prev) => prev.filter((v) => v.id !== id))}
            onDeleteProducto={(id) => setProductos((prev) => prev.filter((p) => p.id !== id))}
          />
        )}
      </div>

      {/* Acceso rápido: turno en 1 toque desde cualquier pantalla */}
      <button
        onClick={openQuickBooking}
        style={{
          position: "fixed", bottom: 78, right: 16, zIndex: 40,
          width: 56, height: 56, borderRadius: 28, background: RED, color: "#fff",
          border: "3px solid #fff", boxShadow: "0 4px 14px rgba(228,0,43,0.45)",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 900, lineHeight: 1,
        }}
        aria-label="Turno rápido"
      >
        +
      </button>

      <div style={{ position: "sticky", bottom: 0, background: "#fff", borderTop: "1px solid #e6e6e6", display: "flex", justifyContent: "space-around", padding: "8px 0", maxWidth: 480, margin: "0 auto" }}>
        <NavBtn icon={LayoutDashboard} label="Inicio" active={tab === "dashboard"} onClick={() => setTab("dashboard")} />
        <NavBtn icon={Calendar} label="Agenda" active={tab === "agenda"} onClick={() => setTab("agenda")} />
        <NavBtn icon={Users} label="Clientes" active={tab === "clientes"} onClick={() => setTab("clientes")} />
        <NavBtn icon={Scissors} label="Servicios" active={tab === "servicios"} onClick={() => setTab("servicios")} />
        <NavBtn icon={ShoppingBag} label="Ventas" active={tab === "ventas"} onClick={() => setTab("ventas")} />
      </div>

      {modal && (
        <Modal onClose={() => setModal(null)}>
          {modal.type === "cita" && (
            <CitaForm
              barbers={barbers}
              clients={clients}
              services={services}
              defaultBarberId={modal.barberId}
              defaultDate={modal.date}
              defaultTime={modal.time}
              onSave={(cita) => {
                setAppointments((prev) => [...prev, { id: uid(), estado: "Pendiente", pago: null, obs: "", ...cita }]);
                setModal(null);
              }}
              onNuevoCliente={(c) => {
                const nc = { id: uid(), ...c };
                setClients((prev) => [...prev, nc]);
                return nc;
              }}
            />
          )}
          {modal.type === "detalle" && (
            <CitaDetalle
              cita={withNames.find((a) => a.id === modal.cita.id) || modal.cita}
              onEstado={(estado, pago) => {
                updateEstado(modal.cita.id, estado, pago);
                setModal(null);
              }}
              onDelete={() => {
                deleteAppointment(modal.cita.id);
                setModal(null);
              }}
            />
          )}
          {modal.type === "cliente" && (
            <ClienteForm
              onSave={(data) => {
                setClients((prev) => [...prev, { id: uid(), ...data }]);
                setModal(null);
              }}
            />
          )}
          {modal.type === "servicio" && (
            <ServicioForm
              onSave={(data) => {
                setServices((prev) => [...prev, { id: uid(), ...data }]);
                setModal(null);
              }}
            />
          )}
          {modal.type === "venta" && (
            <VentaForm
              productos={productos}
              onSave={(data) => {
                setVentas((prev) => [...prev, { id: uid(), date: todayISO(), ...data }]);
                setModal(null);
              }}
            />
          )}
          {modal.type === "producto" && (
            <ProductoForm
              onSave={(data) => {
                setProductos((prev) => [...prev, { id: uid(), ...data }]);
                setModal(null);
              }}
            />
          )}
        </Modal>
      )}
    </div>
);
}

function NavBtn({ icon: Icon, label, active, onClick }) {
return (
    <button onClick={onClick} style={{ background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: active ? RED : GRAY, padding: "4px 6px" }}>
      <Icon size={19} strokeWidth={active ? 2.6 : 2} />
      <span style={{ fontSize: 9.5, fontWeight: active ? 700 : 400 }}>{label}</span>
    </button>
);
}
function SectionTitle({ children, action }) {
return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
      <div style={{ fontWeight: 900, fontSize: 20, color: BLACK }}>{children}</div>
      {action}
    </div>
);
}
function AddBtn({ onClick, label = "Agregar" }) {
return (
    <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 5, background: RED, color: "#fff", border: "none", borderRadius: 6, padding: "8px 12px", fontWeight: 700, fontSize: 12.5 }}>
      <Plus size={15} /> {label}
    </button>
);
}
function Empty({ text }) {
return (
    <div style={{ background: "#fff", border: "1px dashed #ddd", borderRadius: 10, padding: "26px 16px", textAlign: "center", color: GRAY, fontSize: 13.5 }}>
      {text}
    </div>
);
}

// ---------------- DASHBOARD ----------------
function StatCard({ label, data }) {
return (
    <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: 10, padding: 15, flex: 1 }}>
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, color: RED }}>{label}</div>
      <div style={{ fontSize: 21, fontWeight: 900, marginTop: 4 }}>{money(data.total)}</div>
      <div style={{ fontSize: 11.5, color: GRAY }}>{data.count} turno{data.count !== 1 ? "s" : ""}</div>
    </div>
);
}
function DashboardView({ stats }) {
const maxPago = Math.max(1, ...Object.values(stats.porPago));
const maxServ = Math.max(1, ...stats.serviciosMasVendidos.map(([, n]) => n));
return (
    <div>
      <SectionTitle>Dashboard</SectionTitle>
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <StatCard label="HOY" data={stats.day} />
        <StatCard label="SEMANA" data={stats.week} />
        <StatCard label="MES" data={stats.month} />
      </div>

      <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: 10, padding: 16, marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontWeight: 700, fontSize: 13, marginBottom: 12 }}>
          <TrendingUp size={15} color={RED} /> Servicios más vendidos (mes)
        </div>
        {stats.serviciosMasVendidos.length === 0 && <div style={{ fontSize: 12.5, color: GRAY }}>Todavía no hay turnos confirmados este mes.</div>}
        {stats.serviciosMasVendidos.map(([name, n]) => (
          <div key={name} style={{ marginBottom: 9 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 3 }}>
              <span>{name}</span><span style={{ fontWeight: 700 }}>{n}</span>
            </div>
            <div style={{ height: 6, background: "#f0f0f0", borderRadius: 4 }}>
              <div style={{ height: 6, width: `${(n / maxServ) * 100}%`, background: RED, borderRadius: 4 }} />
            </div>
          </div>
        ))}
      </div>

      <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: 10, padding: 16, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12 }}>Facturación por forma de pago (mes)</div>
        {PAYMENT_METHODS.map((m) => (
          <div key={m} style={{ marginBottom: 9 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 3 }}>
              <span>{m}</span><span style={{ fontWeight: 700 }}>{money(stats.porPago[m])}</span>
            </div>
            <div style={{ height: 6, background: "#f0f0f0", borderRadius: 4 }}>
              <div style={{ height: 6, width: `${(stats.porPago[m] / maxPago) * 100}%`, background: BLACK, borderRadius: 4 }} />
            </div>
          </div>
        ))}
      </div>

      <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: 10, padding: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontWeight: 700, fontSize: 13, marginBottom: 4 }}>
          <ShoppingBag size={15} /> Ventas de productos hoy
        </div>
        <div style={{ fontSize: 22, fontWeight: 900, marginTop: 4 }}>{money(stats.ventasHoy.total)}</div>
        <div style={{ fontSize: 12, color: GRAY }}>{stats.ventasHoy.count} venta{stats.ventasHoy.count !== 1 ? "s" : ""}</div>
      </div>
    </div>
);
}

// ---------------- AGENDA ----------------
function occupiedSlots(a) {
const start = slotIndex(a.time);
const span = Math.max(1, Math.round((a.duration || 30) / 30));
return Array.from({ length: span }, (_, i) => start + i);
}
function EstadoPill({ estado }) {
const cfg = {
    Pendiente: { bg: "#FFF3E0", color: "#B36B00" },
    Confirmado: { bg: "#E9F7EE", color: "#1E7E42" },
    Cancelado: { bg: "#f0f0f0", color: GRAY },
}[estado];
return <span style={{ background: cfg.bg, color: cfg.color, fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 20 }}>{estado}</span>;
}
function WeekStrip({ agendaDate, setAgendaDate, weekOffset, setWeekOffset }) {
const monday = addDays(startOfWeek(agendaDate), weekOffset * 7);
const days = Array.from({ length: 7 }, (_, i) => addDays(monday, i));
const todayStr = todayISO();

return (
    <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 14 }}>
      <button onClick={() => setWeekOffset((w) => w - 1)} style={{ background: "#fff", border: "1px solid #eee", borderRadius: 8, padding: 8, flexShrink: 0 }}><ChevronLeft size={15} /></button>
      <div style={{ display: "flex", gap: 4, flex: 1, overflowX: "auto" }}>
        {days.map((d) => {
          const working = isWorkingDay(d);
          const selected = d === agendaDate;
          const isToday = d === todayStr;
          const jsDate = new Date(d + "T00:00:00");
          return (
            <button
              key={d}
              disabled={!working}
              onClick={() => setAgendaDate(d)}
              style={{
                flex: "1 0 38px", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                padding: "8px 4px", borderRadius: 8, border: selected ? `2px solid ${RED}` : isToday ? `1px solid ${RED}` : "1px solid #eee",
                background: selected ? BLACK : "#fff",
                color: !working ? "#ccc" : selected ? "#fff" : GRAY,
                opacity: working ? 1 : 0.55,
              }}
            >
              <span style={{ fontSize: 9.5, fontWeight: 700, textTransform: "uppercase" }}>{jsDate.toLocaleDateString("es-AR", { weekday: "short" }).slice(0, 2)}</span>
              <span style={{ fontSize: 14, fontWeight: 900 }}>{jsDate.getDate()}</span>
            </button>
          );
        })}
      </div>
      <button onClick={() => setWeekOffset((w) => w + 1)} style={{ background: "#fff", border: "1px solid #eee", borderRadius: 8, padding: 8, flexShrink: 0 }}><ChevronRight size={15} /></button>
    </div>
);
}

function AgendaView({ barbers, withNames, agendaDate, setAgendaDate, agendaBarberId, setAgendaBarberId, onSlotClick, onOpenCita }) {
const [weekOffset, setWeekOffset] = useState(0);
const dayAppts = withNames.filter((a) => a.date === agendaDate && a.barberId === agendaBarberId && a.estado !== "Cancelado");
const occupiedMap = {};
dayAppts.forEach((a) => {
    occupiedSlots(a).forEach((idx, i) => {
      occupiedMap[idx] = { a, isStart: i === 0 };
    });
});
const working = isWorkingDay(agendaDate);

return (
    <div>
      <SectionTitle>Agenda</SectionTitle>

      <WeekStrip agendaDate={agendaDate} setAgendaDate={setAgendaDate} weekOffset={weekOffset} setWeekOffset={setWeekOffset} />
      <div style={{ fontWeight: 700, fontSize: 13.5, textTransform: "capitalize", marginBottom: 12, color: working ? BLACK : GRAY }}>{fmtDate(agendaDate)}</div>

      {!working ? (
        <Empty text="Cerrado este día. La barbería atiende de martes a sábado." />
      ) : (
      <>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {barbers.map((b) => (
          <button
            key={b.id}
            onClick={() => setAgendaBarberId(b.id)}
            style={{
              flex: 1, padding: "9px 0", borderRadius: 8, border: agendaBarberId === b.id ? `2px solid ${RED}` : "1px solid #ddd",
              background: "#fff", fontWeight: agendaBarberId === b.id ? 900 : 400, fontSize: 12.5,
              color: agendaBarberId === b.id ? RED : GRAY,
            }}
          >
            {b.name}
          </button>
        ))}
      </div>

      <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: 10, overflow: "hidden" }}>
        {SLOTS.map((time, idx) => {
          const occ = occupiedMap[idx];
          if (occ && !occ.isStart) return null;
          if (occ && occ.isStart) {
            const a = occ.a;
            const span = occupiedSlots(a).length;
            return (
              <button
                key={time}
                onClick={() => onOpenCita(a)}
                style={{
                  width: "100%", textAlign: "left", border: "none", borderBottom: "1px solid #f2f2f2", background: "#fff8f8",
                  padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center",
                  borderLeft: `3px solid ${RED}`,
                }}
              >
                <div>
                  <div style={{ fontSize: 11.5, color: GRAY, fontWeight: 700 }}>{time} · {span * 30} min</div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{a.client?.name}</div>
                  <div style={{ fontSize: 12, color: GRAY }}>{a.service?.name}</div>
                </div>
                <EstadoPill estado={a.estado} />
              </button>
            );
          }
          return (
            <button
              key={time}
              onClick={() => onSlotClick(time)}
              style={{ width: "100%", textAlign: "left", border: "none", borderBottom: "1px solid #f2f2f2", background: "#fff", padding: "9px 14px", display: "flex", alignItems: "center", gap: 10, color: GRAY_LIGHT }}
            >
              <Clock size={13} /> <span style={{ fontSize: 12.5 }}>{time}</span>
              <span style={{ marginLeft: "auto", fontSize: 11, fontWeight: 700, color: RED }}>+ turno</span>
            </button>
          );
        })}
      </div>
      </>
      )}
    </div>
);
}

function CitaForm({ barbers, clients, services, defaultBarberId, defaultDate, defaultTime, onSave, onNuevoCliente }) {
const [barberId, setBarberId] = useState(defaultBarberId);
const [clientId, setClientId] = useState(clients[0]?.id || "");
const [serviceId, setServiceId] = useState(services[0]?.id || "");
const [date] = useState(defaultDate);
const [time] = useState(defaultTime);
const [customDuration, setCustomDuration] = useState(60);
const [obs, setObs] = useState("");
const [nuevo, setNuevo] = useState(false);
const [newName, setNewName] = useState("");
const [newPhone, setNewPhone] = useState("");
const [newInsta, setNewInsta] = useState("");
const [newBday, setNewBday] = useState("");

const service = services.find((s) => s.id === serviceId);

function save() {
    let finalClientId = clientId;
    if (nuevo && newName) {
      const c = onNuevoCliente({ name: newName, phone: newPhone, instagram: newInsta, birthday: newBday });
      finalClientId = c.id;
    }
    if (!barberId || !finalClientId || !serviceId) return;
    onSave({ barberId, clientId: finalClientId, serviceId, date, time, duration: service?.duration || customDuration, obs });
}

return (
    <div>
      <div style={{ fontWeight: 900, fontSize: 18, marginBottom: 4 }}>Nuevo turno</div>
      <div style={{ fontSize: 13, color: GRAY, marginBottom: 16 }}>{date} · {time}</div>

      {!nuevo ? (
        <Field label="Cliente">
          <select style={inputStyle} value={clientId} onChange={(e) => setClientId(e.target.value)}>
            {clients.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <button onClick={() => setNuevo(true)} style={{ background: "none", border: "none", color: RED, fontSize: 12.5, fontWeight: 700, marginTop: 6, padding: 0 }}>+ Cliente nuevo</button>
        </Field>
      ) : (
        <>
          <Field label="Nombre"><input style={inputStyle} value={newName} onChange={(e) => setNewName(e.target.value)} /></Field>
          <Field label="Teléfono"><input style={inputStyle} value={newPhone} onChange={(e) => setNewPhone(e.target.value)} /></Field>
          <Field label="Instagram"><input style={inputStyle} value={newInsta} onChange={(e) => setNewInsta(e.target.value)} placeholder="@usuario" /></Field>
          <Field label="Cumpleaños"><input type="date" style={inputStyle} value={newBday} onChange={(e) => setNewBday(e.target.value)} /></Field>
          <button onClick={() => setNuevo(false)} style={{ background: "none", border: "none", color: GRAY, fontSize: 12.5, marginBottom: 10, padding: 0 }}>← Elegir cliente existente</button>
        </>
      )}

      <Field label="Barbero">
        <select style={inputStyle} value={barberId} onChange={(e) => setBarberId(e.target.value)}>
          {barbers.map((b) => <option key={b.id} value={b.id}>{b.name}</option>)}
        </select>
      </Field>

      <Field label="Servicio">
        <select style={inputStyle} value={serviceId} onChange={(e) => setServiceId(e.target.value)}>
          {services.map((s) => <option key={s.id} value={s.id}>{s.name} — {money(s.price)}</option>)}
        </select>
      </Field>

      {service && !service.duration && (
        <Field label="Duración estimada (min) — servicio personalizable">
          <input type="number" style={inputStyle} value={customDuration} onChange={(e) => setCustomDuration(Number(e.target.value))} />
        </Field>
      )}

      <Field label="Observaciones">
        <textarea style={{ ...inputStyle, minHeight: 60 }} value={obs} onChange={(e) => setObs(e.target.value)} placeholder="Opcional" />
      </Field>

      <button onClick={save} style={{ width: "100%", background: RED, color: "#fff", border: "none", borderRadius: 8, padding: "12px 0", fontWeight: 700, fontSize: 14.5 }}>
        Guardar turno (Pendiente)
      </button>
    </div>
);
}

          <span style={{ fontSize: 13, color: GRAY }}>Total</span>
          <span style={{ fontSize: 20, fontWeight: 900 }}>{money(total)}</span>
        </div>
        <button
          disabled={!productoId || cantidad < 1}
          onClick={() => onSave({ productoId, productoNombre: producto?.name, cantidad: Number(cantidad), pago, total, ts: Date.now() })}
          style={{ width: "100%", background: productoId ? RED : "#ccc", color: "#fff", border: "none", borderRadius: 8, padding: "12px 0", fontWeight: 700, fontSize: 15 }}
        >
          Registrar venta
        </button>
      </>
    )}
  </div>
);
}

function ProductoForm({ onSave }) {
const [name, setName] = React.useState("");
const [price, setPrice] = React.useState("");
return (
  <div>
    <div style={{ fontWeight: 900, fontSize: 18, marginBottom: 16 }}>Nuevo producto</div>
    <Field label="Nombre"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="Ej: Pomada mate" /></Field>
    <Field label="Precio"><input type="number" style={inputStyle} value={price} onChange={(e) => setPrice(e.target.value)} placeholder="0" /></Field>
    <button
      disabled={!name || !price}
      onClick={() => onSave({ name, price: Number(price) })}
      style={{ width: "100%", background: name && price ? BLACK : "#ccc", color: "#fff", border: "none", borderRadius: 8, padding: "12px 0", fontWeight: 700 }}
    >
      Guardar producto
    </button>
  </div>
);
}


}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
