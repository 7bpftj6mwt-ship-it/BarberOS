<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Barba Roja - Sistema Pro V4</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .tab-bar { background: #1e293b; border-top: 1px solid #334155; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; }
        .nav-item.active { color: #ef4444; }
        .card { background: #1e293b; border-radius: 1rem; border: 1px solid #334155; }
        .btn-red { background: #ef4444; color: white; border-radius: 0.5rem; transition: all 0.2s; }
        .btn-red:active { transform: scale(0.95); background: #dc2626; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        input, select { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; border-radius: 0.5rem !important; padding: 0.5rem; width: 100%; }
        .day-btn { min-width: 65px; text-align: center; padding: 0.5rem; border-radius: 0.75rem; background: #334155; border: 1px solid transparent; }
        .day-btn.active { background: #ef4444; border-color: #f87171; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [tab, setTab] = useState('agenda');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [clients, setClients] = useState(() => JSON.parse(localStorage.getItem('br_clients') || '[]'));
            const [appointments, setAppointments] = useState(() => JSON.parse(localStorage.getItem('br_appointments') || '{}'));
            const [services, setServices] = useState(() => JSON.parse(localStorage.getItem('br_services') || '[{"id":1,"name":"Corte","price":18000},{"id":2,"name":"Barba","price":8000},{"id":3,"name":"Combo","price":22000},{"id":4,"name":"Colores","price":75000}]'));
            
            useEffect(() => localStorage.setItem('br_clients', JSON.stringify(clients)), [clients]);
            useEffect(() => localStorage.setItem('br_appointments', JSON.stringify(appointments)), [appointments]);
            useEffect(() => localStorage.setItem('br_services', JSON.stringify(services)), [services]);

            const days = useMemo(() => {
                const arr = [];
                for (let i = 0; i < 14; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    if (d.getDay() !== 0) { // Omitir Domingos
                        arr.push({
                            date: d.toISOString().split('T')[0],
                            label: d.toLocaleDateString('es-AR', { weekday: 'short' }),
                            num: d.getDate()
                        });
                    }
                }
                return arr;
            }, []);

            const hours = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30"];

            const handleBooking = (barber, hour) => {
                const clientName = prompt("Nombre del cliente:");
                if (!clientName) return;
                const newApps = { ...appointments };
                if (!newApps[selectedDate]) newApps[selectedDate] = {};
                newApps[selectedDate][`${barber}-${hour}`] = { client: clientName, status: 'pendiente' };
                setAppointments(newApps);
            };

            const deleteBooking = (barber, hour) => {
                if (confirm("¿Eliminar turno?")) {
                    const newApps = { ...appointments };
                    delete newApps[selectedDate][`${barber}-${hour}`];
                    setAppointments(newApps);
                }
            };

            const updatePrice = (id, newPrice) => {
                setServices(services.map(s => s.id === id ? { ...s, price: parseInt(newPrice) || 0 } : s));
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto overflow-hidden shadow-2xl bg-slate-900">
                    <header className="p-4 bg-slate-800 shadow-lg text-center border-b border-red-500/30">
                        <h1 className="text-xl font-bold tracking-tighter text-red-500">BARBA ROJA PRO V4</h1>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 p-4 scroll-hide">
                        {tab === 'agenda' && (
                            <div className="space-y-6">
                                <div className="flex space-x-2 overflow-x-auto pb-2 scroll-hide">
                                    {days.map(d => (
                                        <button key={d.date} onClick={() => setSelectedDate(d.date)} className={`day-btn ${selectedDate === d.date ? 'active' : ''}`}>
                                            <div className="text-[10px] uppercase opacity-70">{d.label}</div>
                                            <div className="text-lg font-bold">{d.num}</div>
                                        </button>
                                    ))}
                                </div>

                                {['Gonzalo', 'Pablo'].map(barber => (
                                    <div key={barber} className="card p-4">
                                        <h2 className="text-lg font-bold mb-4 flex items-center">
                                            <span className="w-2 h-2 bg-red-500 rounded-full mr-2"></span> Agenda {barber}
                                        </h2>
                                        <div className="grid grid-cols-2 gap-2">
                                            {hours.map(h => {
                                                const app = appointments[selectedDate]?.[`${barber}-${h}`];
                                                return (
                                                    <div key={h} onClick={() => app ? deleteBooking(barber, h) : handleBooking(barber, h)} className={`p-3 rounded-lg text-center transition-all cursor-pointer border ${app ? 'bg-red-500/20 border-red-500' : 'bg-slate-700/50 border-slate-600'}`}>
                                                        <div className="text-xs font-bold opacity-70">{h}</div>
                                                        <div className="text-sm truncate">{app ? app.client : 'Disponible'}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'clientes' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold">Base de Clientes</h2>
                                <div className="card p-4 space-y-3">
                                    <input type="text" placeholder="Nombre" id="c_name" />
                                    <input type="tel" placeholder="WhatsApp" id="c_tel" />
                                    <button onClick={() => {
                                        const n = document.getElementById('c_name').value;
                                        const t = document.getElementById('c_tel').value;
                                        if(n) { setClients([...clients, { name: n, tel: t }]); document.getElementById('c_name').value=''; document.getElementById('c_tel').value=''; }
                                    }} className="btn-red w-full py-2 font-bold">Agregar Cliente</button>
                                </div>
                                <div className="space-y-2">
                                    {clients.map((c, i) => (
                                        <div key={i} className="card p-3 flex justify-between items-center">
                                            <div>
                                                <div className="font-bold">{c.name}</div>
                                                <div className="text-xs opacity-60">{c.tel}</div>
                                            </div>
                                            <button onClick={() => setClients(clients.filter((_, idx) => idx !== i))} className="text-red-400 text-sm">Borrar</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'caja' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-bold">Ajustes y Precios</h2>
                                <div className="card p-4 space-y-4">
                                    <h3 className="font-bold text-red-400 mb-2 uppercase text-xs">Lista de Precios</h3>
                                    {services.map(s => (
                                        <div key={s.id} className="flex items-center space-x-3">
                                            <span className="flex-1 font-medium">{s.name}</span>
                                            <div className="relative w-32">
                                                <span className="absolute left-2 top-2 text-slate-400">$</span>
                                                <input type="number" value={s.price} onChange={(e) => updatePrice(s.id, e.target.value)} className="pl-6 text-right font-bold" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="card p-4">
                                    <h3 className="font-bold text-slate-400 mb-2 uppercase text-xs">Estadísticas Rápidas</h3>
                                    <div className="text-2xl font-bold text-green-400">$ {Object.values(appointments[selectedDate] || {}).length * services[0].price}*</div>
                                    <div className="text-[10px] opacity-50">*Estimado basado en turnos del día y precio base.</div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="tab-bar fixed bottom-0 left-0 right-0 p-3 flex justify-around items-center max-w-md mx-auto">
                        <button onClick={() => setTab('agenda')} className={`nav-item ${tab === 'agenda' ? 'active' : ''}`}>
                            <span className="text-xl">📅</span><span>Agenda</span>
                        </button>
                        <button onClick={() => setTab('clientes')} className={`nav-item ${tab === 'clientes' ? 'active' : ''}`}>
                            <span className="text-xl">👥</span><span>Clientes</span>
                        </button>
                        <button onClick={() => setTab('caja')} className={`nav-item ${tab === 'caja' ? 'active' : ''}`}>
                            <span className="text-xl">💰</span><span>Precios</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
