<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>BarberOS - Barba Roja</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap' rel='stylesheet'>
    <style>
        body { background-color: #0D0D0D; color: white; font-family: 'Lato', sans-serif; margin: 0; padding-bottom: 80px; }
        .bg-card { background-color: #1A1A1A; border: 1px solid #333; }
        .btn-primary { background-color: #E4002B; color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); background-color: #b30021; }
        .btn-time { background-color: #262626; border: 1px solid #444; color: #aaa; transition: all 0.2s; }
        .btn-time.selected { background-color: #E4002B !important; border-color: #E4002B !important; color: white !important; }
        .btn-time.occupied { background-color: #331a1a !important; color: #555 !important; border-color: #442222 !important; text-decoration: line-through; pointer-events: none; }
        input, select { background: #262626 !important; color: white !important; border: 1px solid #444 !important; border-radius: 8px !important; padding: 10px !important; width: 100%; }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('agenda');
            // Inicializamos con Gonzalo y Pablo Lisandro
            const [barberos, setBarberos] = useState(() => JSON.parse(localStorage.getItem('barberOS_barberos')) || ['Gonzalo', 'Pablo Lisandro']);
            const [precios, setPrecios] = useState(() => JSON.parse(localStorage.getItem('barberOS_precios')) || { 'Corte': 5000, 'Barba': 3000, 'Combo': 7000 });
            const [turnos, setTurnos] = useState(() => JSON.parse(localStorage.getItem('barberOS_turnos')) || []);
            
            const [nuevoTurno, setNuevoTurno] = useState({ 
                cliente: '', 
                barbero: barberos[0], 
                servicio: 'Corte', 
                fecha: new Date().toISOString().split('T')[0], 
                hora: '' 
            });

            useEffect(() => {
                localStorage.setItem('barberOS_barberos', JSON.stringify(barberos));
                localStorage.setItem('barberOS_precios', JSON.stringify(precios));
                localStorage.setItem('barberOS_turnos', JSON.stringify(turnos));
            }, [barberos, precios, turnos]);

            // Grilla solicitada: 9-12 y 14-21
            const slots = [
                '09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00',
                '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00', '20:30', '21:00'
            ];

            const agregarTurno = (e) => {
                e.preventDefault();
                if (!nuevoTurno.cliente || !nuevoTurno.fecha || !nuevoTurno.hora) return alert('Por favor, completa todos los campos y elegí un horario.');
                
                const fechaObj = new Date(nuevoTurno.fecha + 'T12:00:00'); 
                const diaSemana = fechaObj.getDay(); 
                if (diaSemana === 0 || diaSemana === 1) return alert('La barbería está cerrada Lunes y Domingos. Elegí un día de Martes a Sábado.');

                setTurnos([...turnos, { ...nuevoTurno, id: Date.now() }]);
                setNuevoTurno({ ...nuevoTurno, cliente: '', hora: '' });
                alert('¡Turno agendado con éxito!');
            };

            const borrarTurno = (id) => {
                if(confirm('¿Borrar este turno?')) setTurnos(turnos.filter(t => t.id !== id));
            };

            return (
                <div className='max-w-md mx-auto p-4'>
                    <header className='flex items-center gap-4 mb-6 pt-4'>
                        <div className='w-12 h-12 bg-[#E4002B] rounded-full flex items-center justify-center font-black text-xl italic text-black'>BR</div>
                        <div>
                            <h1 className='font-black text-2xl tracking-tighter uppercase'>BarberOS</h1>
                            <p className='text-[10px] text-gray-500 font-bold uppercase tracking-widest text-left'>Barba Roja · Santa Fe</p>
                        </div>
                    </header>

                    {view === 'agenda' && (
                        <div className='space-y-6'>
                            <form onSubmit={agregarTurno} className='bg-card p-4 rounded-xl space-y-4 shadow-2xl'>
                                <h2 className='text-[#E4002B] font-black italic'>NUEVO TURNO</h2>
                                <input placeholder='Nombre del Cliente' value={nuevoTurno.cliente} onChange={e => setNuevoTurno({...nuevoTurno, cliente: e.target.value})} />
                                <div className='grid grid-cols-2 gap-2'>
                                    <input type='date' value={nuevoTurno.fecha} onChange={e => setNuevoTurno({...nuevoTurno, fecha: e.target.value})} />
                                    <select value={nuevoTurno.barbero} onChange={e => setNuevoTurno({...nuevoTurno, barbero: e.target.value})}>
                                        {barberos.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                                <select value={nuevoTurno.servicio} onChange={e => setNuevoTurno({...nuevoTurno, servicio: e.target.value})}>
                                    {Object.keys(precios).map(s => <option key={s} value={s}>{s} ()</option>)}
                                </select>
                                
                                <div className='space-y-2'>
                                    <p className='text-xs font-bold text-gray-400 uppercase'>Horarios (Mar-Sáb):</p>
                                    <div className='grid grid-cols-4 gap-2'>
                                        {slots.map(s => {
                                            const ocupado = turnos.some(t => t.fecha === nuevoTurno.fecha && t.hora === s && t.barbero === nuevoTurno.barbero);
                                            let btnClass = 'btn-time p-2 rounded text-xs font-bold ';
                                            if (ocupado) btnClass += 'occupied';
                                            else if (nuevoTurno.hora === s) btnClass += 'selected';
                                            
                                            return (
                                                <button 
                                                    key={s} 
                                                    type='button'
                                                    onClick={() => setNuevoTurno({...nuevoTurno, hora: s})}
                                                    className={btnClass}
                                                >
                                                    {s}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                <button type='submit' className='btn-primary w-full py-4 rounded-xl font-black italic text-lg shadow-lg'>RESERVAR TURNO</button>
                            </form>

                            <div className='space-y-4 pb-20'>
                                <h2 className='font-black italic text-gray-400 uppercase text-xs tracking-widest'>Próximos Turnos</h2>
                                {turnos.length === 0 && <p className='text-gray-600 text-center text-sm italic'>No hay turnos agendados aún.</p>}
                                {[...turnos].filter(t => t.fecha >= new Date().toISOString().split('T')[0]).sort((a,b) => (a.fecha+a.hora).localeCompare(b.fecha+b.hora)).map(t => (
                                    <div key={t.id} className='bg-card p-3 rounded-xl flex justify-between items-center border-l-4 border-[#E4002B]'>
                                        <div>
                                            <div className='font-black uppercase text-sm tracking-tighter'>{t.cliente}</div>
                                            <div className='text-[10px] text-gray-400 font-bold'>{t.fecha.split('-').reverse().join('/')} — {t.hora} hs</div>
                                            <div className='text-[9px] text-[#E4002B] font-black uppercase'>{t.barbero} | {t.servicio}</div>
                                        </div>
                                        <button onClick={() => borrarTurno(t.id)} className='text-gray-700 hover:text-white p-2'>✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'config' && (
                        <div className='space-y-8'>
                            <section className='bg-card p-4 rounded-xl space-y-4'>
                                <h2 className='text-[#E4002B] font-black italic uppercase'>Gestión del Equipo</h2>
                                <p className='text-[10px] text-gray-500 uppercase font-black'>Horarios: Mar-Sáb (9-12 / 14-21)</p>
                                <div className='flex gap-2 pt-2'>
                                    <input className='flex-1' placeholder='Nuevo Barbero' id='newBarb' />
                                    <button onClick={() => {
                                        const n = document.getElementById('newBarb').value;
                                        if(n){ setBarberos([...barberos, n]); document.getElementById('newBarb').value=''; }
                                    }} className='btn-primary px-4 rounded-lg font-black'>+</button>
                                </div>
                                <div className='flex flex-wrap gap-2'>
                                    {barberos.map(b => <span key={b} className='bg-[#262626] px-3 py-1 rounded-full text-[10px] font-black border border-[#444] uppercase'>{b}</span>)}
                                </div>
                            </section>
                            
                            <section className='bg-card p-4 rounded-xl space-y-4'>
                                <h2 className='text-[#E4002B] font-black italic uppercase'>Precios de Servicios</h2>
                                {Object.keys(precios).map(s => (
                                    <div key={s} className='flex items-center justify-between'>
                                        <label className='text-xs font-black uppercase text-gray-400'>{s}</label>
                                        <input type='number' className='w-24 text-right text-xs' value={precios[s]} onChange={e => setPrecios({...precios, [s]: Number(e.target.value)})} />
                                    </div>
                                ))}
                            </section>
                        </div>
                    )}

                    <nav className='fixed bottom-0 left-0 right-0 bg-[#0D0D0D] border-t border-[#333] p-4 flex justify-around items-center z-50'>
                        <button onClick={() => setView('agenda')} className={'flex flex-col items-center ' + (view === 'agenda' ? 'text-[#E4002B]' : 'text-gray-500')}>
                            <span className='text-2xl'>📅</span>
                            <span className='text-[9px] font-black uppercase mt-1'>Agenda</span>
                        </button>
                        <button onClick={() => setView('config')} className={'flex flex-col items-center ' + (view === 'config' ? 'text-[#E4002B]' : 'text-gray-500')}>
                            <span className='text-2xl'>⚙️</span>
                            <span className='text-[9px] font-black uppercase mt-1'>Config</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
