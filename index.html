<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Barba Roja - Sistema Profesional</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 1rem; }
        .btn-primary { background: #ef4444; color: white; padding: 0.75rem; border-radius: 0.5rem; font-weight: 600; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; }
        .nav-item.active { color: #ef4444; }
        .slot { border-bottom: 1px solid #334155; padding: 0.75rem 0; display: flex; align-items: center; }
        input, select { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; border-radius: 0.5rem !important; }
        .day-btn { min-width: 80px; text-align: center; padding: 0.5rem; border-radius: 0.5rem; background: #1e293b; border: 1px solid #334155; }
        .day-btn.active { background: #ef4444; border-color: #ef4444; }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('agenda');
            const [diaSeleccionado, setDiaSeleccionado] = useState(new Date().toLocaleDateString('es-AR', { weekday: 'long' }));
            
            // Persistencia corregida con prefijo único
            const [clientes, setClientes] = useState(() => {
                const saved = localStorage.getItem('barbaroja_v3_clientes');
                return saved ? JSON.parse(saved) : [];
            });
            const [turnos, setTurnos] = useState(() => {
                const saved = localStorage.getItem('barbaroja_v3_turnos');
                return saved ? JSON.parse(saved) : {};
            });
            const [precios] = useState({ 'Corte': 18000, 'Barba': 8000, 'Combo': 22000, 'Color': 75000 });

            useEffect(() => { localStorage.setItem('barbaroja_v3_clientes', JSON.stringify(clientes)); }, [clientes]);
            useEffect(() => { localStorage.setItem('barbaroja_v3_turnos', JSON.stringify(turnos)); }, [turnos]);

            const diasSemana = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
            const horarios = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30"];
            const barberos = ['Gonzalo', 'Pablo'];

            const agendar = (dia, barbero, hora, clienteNombre, servicio) => {
                const key = `${dia}-${barbero}-${hora}`;
                setTurnos(prev => ({ ...prev, [key]: { nombre: clienteNombre, servicio, precio: precios[servicio] } }));
            };

            const borrarTurno = (key) => {
                const newTurnos = { ...turnos };
                delete newTurnos[key];
                setTurnos(newTurnos);
            };

            return (
                <div className="max-w-md mx-auto pb-24 min-h-screen flex flex-col">
                    {/* BARRA SUPERIOR: DÍAS */}
                    <header className="bg-slate-900 sticky top-0 z-20 border-b border-slate-800 p-4">
                        <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                            {diasSemana.map(d => (
                                <button key={d} onClick={() => setDiaSeleccionado(d)} className={`day-btn capitalize text-sm ${diaSeleccionado === d ? 'active' : ''}`}>
                                    {d}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-4 flex-1">
                        {tab === 'agenda' && (
                            <div className="space-y-8">
                                {barberos.map(barbero => (
                                    <div key={barbero} className="card p-4">
                                        <h2 className="text-xl font-bold text-red-500 mb-4 border-b border-slate-700 pb-2 flex justify-between items-center">
                                            <span>Barbero: {barbero}</span>
                                            <span className="text-xs bg-slate-700 text-white px-2 py-1 rounded">Hoy</span>
                                        </h2>
                                        {horarios.map(hora => {
                                            const key = `${diaSeleccionado}-${barbero}-${hora}`;
                                            const turno = turnos[key];
                                            return (
                                                <div key={hora} className="slot">
                                                    <div className="w-14 font-bold text-slate-400 text-sm">{hora}</div>
                                                    <div className="flex-1 px-2">
                                                        {turno ? (
                                                            <div className="bg-red-500/10 border border-red-500/30 p-2 rounded flex justify-between items-center">
                                                                <div>
                                                                    <p className="font-bold text-red-400 text-sm">{turno.nombre}</p>
                                                                    <p className="text-[10px] text-slate-400 uppercase">{turno.servicio}</p>
                                                                </div>
                                                                <button onClick={() => borrarTurno(key)} className="text-slate-500 text-xs px-2">✕</button>
                                                            </div>
                                                        ) : (
                                                            <select 
                                                                className="w-full p-1 text-xs rounded"
                                                                onChange={(e) => {
                                                                    const [name, serv] = e.target.value.split('|');
                                                                    if(name) agendar(diaSeleccionado, barbero, hora, name, serv);
                                                                }}
                                                                value=""
                                                            >
                                                                <option value="">Disponible...</option>
                                                                {clientes.map(c => (
                                                                    <optgroup key={c.id} label={c.nombre}>
                                                                        {Object.keys(precios).map(s => <option key={s} value={`${c.nombre}|${s}`}>{s}</option>)}
                                                                    </optgroup>
                                                                ))}
                                                            </select>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'clientes' && (
                            <div className="space-y-4">
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const c = { id: Date.now(), nombre: e.target.nombre.value, tel: e.target.tel.value };
                                    setClientes([...clientes, c]);
                                    e.target.reset();
                                }} className="card p-4 space-y-3">
                                    <h2 className="text-lg font-bold">Nuevo Cliente</h2>
                                    <input name="nombre" placeholder="Nombre" className="w-full p-2" required />
                                    <input name="tel" placeholder="WhatsApp" className="w-full p-2" />
                                    <button className="btn-primary w-full">Guardar</button>
                                </form>
                                <div className="card p-4">
                                    <h2 className="text-lg font-bold mb-3">Mis Clientes</h2>
                                    {clientes.map(c => (
                                        <div key={c.id} className="py-2 border-b border-slate-700 last:border-0 flex justify-between">
                                            <span>{c.nombre}</span>
                                            <span className="text-slate-500 text-sm">{c.tel}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {tab === 'caja' && (
                            <div className="card p-6 text-center">
                                <h2 className="text-slate-400 text-sm mb-2 uppercase tracking-widest">Recaudación Total</h2>
                                <p className="text-4xl font-bold text-green-500">
                                    ${Object.values(turnos).reduce((acc, t) => acc + (t.precio || 0), 0)}
                                </p>
                            </div>
                        )}
                    </main>

                    {/* NAVEGACIÓN INFERIOR */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-3 pb-6 z-20">
                        <button onClick={() => setTab('agenda')} className={`nav-item ${tab === 'agenda' ? 'active' : ''}`}>
                            <span className="text-xl">📅</span><span>Agenda</span>
                        </button>
                        <button onClick={() => setTab('clientes')} className={`nav-item ${tab === 'clientes' ? 'active' : ''}`}>
                            <span className="text-xl">👥</span><span>Clientes</span>
                        </button>
                        <button onClick={() => setTab('caja')} className={`nav-item ${tab === 'caja' ? 'active' : ''}`}>
                            <span className="text-xl">💰</span><span>Caja</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
