<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Barba Roja - BarberOS Master</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-active { background: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; transition: 0.3s; }
        .nav-item.active { color: #ef4444; transform: translateY(-3px); }
        .time-slot { border-left: 4px solid transparent; transition: 0.2s; }
        .time-slot.booked { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .calendar-day.active { background: #ef4444; transform: scale(1.1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('agenda');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [clients, setClients] = useState(() => JSON.parse(localStorage.getItem('br_clients')) || []);
            const [appointments, setAppointments] = useState(() => JSON.parse(localStorage.getItem('br_appointments')) || {});
            const [prices, setPrices] = useState(() => JSON.parse(localStorage.getItem('br_prices')) || {
                'Corte': 18000, 'Barba': 8000, 'Combo': 22000, 'Color': 75000
            });

            useEffect(() => { localStorage.setItem('br_clients', JSON.stringify(clients)); }, [clients]);
            useEffect(() => { localStorage.setItem('br_appointments', JSON.stringify(appointments)); }, [appointments]);
            useEffect(() => { localStorage.setItem('br_prices', JSON.stringify(prices)); }, [prices]);

            const timeSlots = [
                '09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00',
                '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00', '20:30'
            ];

            const dates = Array.from({ length: 14 }, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() + i);
                return d.toISOString().split('T')[0];
            });

            const formatDay = (dateStr) => {
                const days = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
                const d = new Date(dateStr + 'T12:00:00');
                return { name: days[d.getDay()], num: d.getDate() };
            };

            const addClient = (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const phone = e.target.phone.value;
                if (!name) return;
                setClients([...clients, { id: Date.now(), name, phone }]);
                e.target.reset();
            };

            const deleteClient = (id) => {
                if (confirm('¿Borrar cliente?')) setClients(clients.filter(c => c.id !== id));
            };

            const toggleAppointment = (barber, time) => {
                const key = `${selectedDate}-${barber}-${time}`;
                if (appointments[key]) {
                    const newApps = { ...appointments };
                    delete newApps[key];
                    setAppointments(newApps);
                } else {
                    const clientName = prompt('Nombre del cliente o servicio:');
                    if (clientName) setAppointments({ ...appointments, [key]: { client: clientName } });
                }
            };

            const updatePrice = (item, val) => {
                setPrices({ ...prices, [item]: parseInt(val) || 0 });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 flex flex-col">
                    {/* Header & Calendar */}
                    <header className="p-4 glass sticky top-0 z-50">
                        <div className="flex items-center justify-between mb-4">
                            <h1 className="text-xl font-bold text-red-500">BARBA ROJA</h1>
                            <span className="text-xs opacity-50">Master v6.0</span>
                        </div>
                        <div className="flex gap-3 overflow-x-auto pb-2 scroll-smooth">
                            {dates.map(date => {
                                const { name, num } = formatDay(date);
                                return (
                                    <button 
                                        key={date}
                                        onClick={() => setSelectedDate(date)}
                                        className={`flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl transition-all ${selectedDate === date ? 'calendar-day active' : 'glass'}`}
                                    >
                                        <span className="text-[10px] font-semibold">{name}</span>
                                        <span className="text-lg font-bold">{num}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </header>

                    <main className="p-4 flex-grow">
                        {tab === 'agenda' && (
                            <div className="space-y-8">
                                {['Gonzalo', 'Pablo'].map(barber => (
                                    <div key={barber} className="space-y-3">
                                        <div className="flex items-center gap-2">
                                            <div className="w-1 h-6 bg-red-500 rounded-full"></div>
                                            <h2 className="text-lg font-bold tracking-tight">Agenda {barber}</h2>
                                        </div>
                                        <div className="grid grid-cols-1 gap-2">
                                            {timeSlots.map(time => {
                                                const app = appointments[`${selectedDate}-${barber}-${time}`];
                                                return (
                                                    <div 
                                                        key={time}
                                                        onClick={() => toggleAppointment(barber, time)}
                                                        className={`time-slot p-3 rounded-xl glass flex items-center justify-between cursor-pointer ${app ? 'booked' : ''}`}
                                                    >
                                                        <span className="text-sm font-semibold opacity-80">{time}</span>
                                                        <span className="text-sm font-bold">{app ? app.client : 'Disponible'}</span>
                                                        <span className="text-xs opacity-40">{app ? '🚫' : '✅'}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'clientes' && (
                            <div className="space-y-6">
                                <form onSubmit={addClient} className="p-4 glass rounded-2xl space-y-3">
                                    <h3 className="font-bold text-sm mb-2">Nuevo Cliente</h3>
                                    <input name="name" placeholder="Nombre completo" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-sm outline-none focus:border-red-500" required />
                                    <input name="phone" placeholder="Celular (opcional)" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-sm outline-none focus:border-red-500" />
                                    <button type="submit" className="w-full p-3 btn-active rounded-xl text-sm font-bold">Guardar Cliente</button>
                                </form>
                                <div className="space-y-2">
                                    {clients.length === 0 ? (
                                        <p className="text-center opacity-40 py-10 text-sm">No hay clientes guardados</p>
                                    ) : (
                                        clients.map(c => (
                                            <div key={c.id} className="p-4 glass rounded-xl flex items-center justify-between">
                                                <div>
                                                    <p className="font-bold text-sm">{c.name}</p>
                                                    <p className="text-xs opacity-50">{c.phone || 'Sin cel'}</p>
                                                </div>
                                                <button onClick={() => deleteClient(c.id)} className="p-2 text-red-400 opacity-50 hover:opacity-100">🗑️</button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {tab === 'precios' && (
                            <div className="space-y-4">
                                <h2 className="text-lg font-bold p-2">Ajustar Precios</h2>
                                {Object.entries(prices).map(([item, price]) => (
                                    <div key={item} className="p-4 glass rounded-2xl flex items-center justify-between">
                                        <span className="font-semibold text-sm">{item}</span>
                                        <div className="flex items-center gap-2">
                                            <span className="text-red-500 font-bold">$</span>
                                            <input 
                                                type="number" 
                                                value={price}
                                                onChange={(e) => updatePrice(item, e.target.value)}
                                                className="w-24 bg-transparent text-right font-bold text-lg outline-none"
                                            />
                                        </div>
                                    </div>
                                ))}
                                <div className="p-6 text-center opacity-30 text-[10px]">
                                    Los cambios se guardan automáticamente en este dispositivo.
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-6 left-4 right-4 h-16 glass rounded-2xl flex items-center justify-around z-50">
                        <button onClick={() => setTab('agenda')} className={`nav-item ${tab === 'agenda' ? 'active' : ''}`}>
                            <span className="text-xl">📅</span><span>Agenda</span>
                        </button>
                        <button onClick={() => setTab('clientes')} className={`nav-item ${tab === 'clientes' ? 'active' : ''}`}>
                            <span className="text-xl">👥</span><span>Clientes</span>
                        </button>
                        <button onClick={() => setTab('precios')} className={`nav-item ${tab === 'precios' ? 'active' : ''}`}>
                            <span className="text-xl">💰</span><span>Precios</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
