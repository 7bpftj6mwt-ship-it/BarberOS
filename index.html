<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Barba Roja - BarberOS Master Pro</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding-bottom: 80px; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .btn-red { background: #ef4444; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; width: 100%; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ef4444; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #94a3b8; border: none; background: none; cursor: pointer; }
        .nav-item.active { color: #ef4444; }
        input, select { background: #334155; border: 1px solid #475569; color: white; border-radius: 6px; padding: 8px; width: 100%; margin-top: 5px; }
        .calendar-strip { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; }
        .day-box { min-width: 65px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #334155; border-radius: 10px; cursor: pointer; }
        .day-box.active { background: #ef4444; border: 2px solid white; }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('agenda');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [clients, setClients] = useState(JSON.parse(localStorage.getItem('clients') || '[]'));
            const [turns, setTurns] = useState(JSON.parse(localStorage.getItem('turns') || '[]'));
            const [prices, setPrices] = useState(JSON.parse(localStorage.getItem('prices') || JSON.stringify({
                'Corte Caballero': 10000,
                'Barba': 5000,
                'Corte + Barba': 13000,
                'Degradé': 11000
            })));

            useEffect(() => { localStorage.setItem('clients', JSON.stringify(clients)); }, [clients]);
            useEffect(() => { localStorage.setItem('turns', JSON.stringify(turns)); }, [turns]);
            useEffect(() => { localStorage.setItem('prices', JSON.stringify(prices)); }, [prices]);

            const days = Array.from({length: 14}, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() + i);
                return d.toISOString().split('T')[0];
            });

            const formatPrice = (p) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(p);

            const calculateRevenue = (period) => {
                const now = new Date();
                let filteredTurns = turns;
                
                if (period === 'day') {
                    filteredTurns = turns.filter(t => t.date === selectedDate);
                } else if (period === 'week') {
                    const oneWeekAgo = new Date();
                    oneWeekAgo.setDate(now.getDate() - 7);
                    filteredTurns = turns.filter(t => new Date(t.date) >= oneWeekAgo && new Date(t.date) <= now);
                } else if (period === 'month') {
                    filteredTurns = turns.filter(t => t.date.startsWith(selectedDate.substring(0, 7)));
                }

                return filteredTurns.reduce((sum, t) => sum + (prices[t.service] || 0), 0);
            };

            const Agenda = () => (
                <div>
                    <div className="calendar-strip">
                        {days.map(d => (
                            <div key={d} className={`day-box ${selectedDate === d ? 'active' : ''}`} onClick={() => setSelectedDate(d)}>
                                <span className="text-xs uppercase font-bold">{new Date(d + 'T12:00:00').toLocaleDateString('es-AR', {weekday: 'short'})}</span>
                                <span className="text-lg font-bold">{d.split('-')[2]}</span>
                            </div>
                        ))}
                    </div>
                    <div className="p-4">
                        <h2 className="text-xl font-bold mb-4">Agenda de {new Date(selectedDate + 'T12:00:00').toLocaleDateString('es-AR', {day: 'numeric', month: 'long'})}</h2>
                        {['Gonzalo', 'Pablo'].map(barber => (
                            <div key={barber} className="card mb-6">
                                <h3 className="text-red-400 font-bold mb-3 border-b border-red-400 pb-1">💈 {barber}</h3>
                                {Array.from({length: 24}, (_, i) => {
                                    const hour = Math.floor(i/2) + 9;
                                    const min = i % 2 === 0 ? '00' : '30';
                                    if (hour > 20) return null;
                                    const time = `${hour}:${min}`;
                                    const turn = turns.find(t => t.date === selectedDate && t.time === time && t.barber === barber);
                                    return (
                                        <div key={time} className="flex justify-between items-center py-2 border-b border-slate-700 last:border-0">
                                            <span className="text-sm font-mono text-slate-400">{time}</span>
                                            {turn ? (
                                                <div className="flex-1 ml-4 bg-slate-700 p-2 rounded flex justify-between items-center">
                                                    <div>
                                                        <p className="font-bold text-sm">{turn.client}</p>
                                                        <p className="text-xs text-red-300">{turn.service}</p>
                                                    </div>
                                                    <button onClick={() => setTurns(turns.filter(t => t !== turn))} className="text-xs">❌</button>
                                                </div>
                                            ) : (
                                                <button onClick={() => {
                                                    const client = prompt('Nombre del cliente:');
                                                    if (!client) return;
                                                    const service = Object.keys(prices)[0];
                                                    setTurns([...turns, { date: selectedDate, time, barber, client, service }]);
                                                }} className="flex-1 ml-4 text-left text-xs text-slate-500 italic">+ Reservar</button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Clientes = () => {
                const [name, setName] = useState('');
                return (
                    <div className="p-4">
                        <h2 className="text-xl font-bold mb-4">Gestión de Clientes</h2>
                        <div className="card">
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="Nombre del cliente..." />
                            <button onClick={() => { if(name){ setClients([...clients, name]); setName(''); } }} className="btn-red mt-3">Guardar Cliente</button>
                        </div>
                        <div className="mt-4">
                            {clients.map((c, i) => (
                                <div key={i} className="flex justify-between items-center bg-slate-800 p-3 rounded mb-2 border-l-4 border-red-500">
                                    <span>{c}</span>
                                    <button onClick={() => setClients(clients.filter((_, idx) => idx !== i))}>🗑️</button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const Caja = () => (
                <div className="p-4">
                    <h2 className="text-xl font-bold mb-4">💰 Caja y Finanzas</h2>
                    
                    <div className="grid grid-cols-1 gap-4 mb-6">
                        <div className="card text-center border-l-4 border-green-500">
                            <p className="text-xs uppercase text-slate-400">Total Hoy ({selectedDate})</p>
                            <p className="text-3xl font-bold text-green-400">{formatPrice(calculateRevenue('day'))}</p>
                        </div>
                        <div className="card text-center border-l-4 border-blue-500">
                            <p className="text-xs uppercase text-slate-400">Últimos 7 días</p>
                            <p className="text-3xl font-bold text-blue-400">{formatPrice(calculateRevenue('week'))}</p>
                        </div>
                        <div className="card text-center border-l-4 border-purple-500">
                            <p className="text-xs uppercase text-slate-400">Mes Actual</p>
                            <p className="text-3xl font-bold text-purple-400">{formatPrice(calculateRevenue('month'))}</p>
                        </div>
                    </div>

                    <h3 className="font-bold mb-3">Configurar Precios</h3>
                    <div className="card">
                        {Object.entries(prices).map(([service, price]) => (
                            <div key={service} className="mb-4">
                                <label className="text-xs text-slate-400 uppercase">{service}</label>
                                <input 
                                    type="number" 
                                    value={price} 
                                    onChange={(e) => setPrices({...prices, [service]: parseInt(e.target.value) || 0})}
                                />
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div>
                    <div className="bg-red-600 p-4 shadow-lg text-center">
                        <h1 className="text-2xl font-black tracking-tighter">BARBA ROJA 💈</h1>
                    </div>
                    
                    {tab === 'agenda' && <Agenda />}
                    {tab === 'clientes' && <Clientes />}
                    {tab === 'caja' && <Caja />}

                    <nav className="nav-bar">
                        <button onClick={() => setTab('agenda')} className={`nav-item ${tab === 'agenda' ? 'active' : ''}`}>
                            <span className="text-xl">📅</span><span>Agenda</span>
                        </button>
                        <button onClick={() => setTab('clientes')} className={`nav-item ${tab === 'clientes' ? 'active' : ''}`}>
                            <span className="text-xl">👥</span><span>Clientes</span>
                        </button>
                        <button onClick={() => setTab('caja')} className={`nav-item ${tab === 'caja' ? 'active' : ''}`}>
                            <span className="text-xl">💰</span><span>Caja</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
