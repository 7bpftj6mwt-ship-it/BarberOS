<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>BarberOS V1 - Master</title>
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap' rel='stylesheet'>
    <style>
        body { background: #080808; color: #eee; font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .card { background: #121212; border: 1px solid #222; border-radius: 14px; padding: 16px; }
        .accent { color: #E4002B; }
        .bg-accent { background: #E4002B; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; border: none; background: none; }
        .nav-btn.active { color: #E4002B; }
        input, select, textarea { background: #1a1a1a !important; color: white !important; border: 1px solid #333 !important; border-radius: 10px !important; padding: 12px !important; width: 100%; outline: none; font-size: 14px; }
        .slot { border: 1px solid #222; border-radius: 8px; padding: 10px; text-align: center; font-size: 12px; font-weight: 700; background: #111; color: #444; }
        .slot.available { color: #888; border-color: #333; }
        .slot.selected { background: #E4002B; color: white; border-color: #E4002B; }
        .slot.occupied { background: #1a0505; color: #500; border-color: #300; text-decoration: line-through; pointer-events: none; }
        .btn-main { background: #E4002B; color: white; font-weight: 900; padding: 16px; border-radius: 12px; width: 100%; text-transform: uppercase; letter-spacing: 1px; border: none; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .badge-pending { background: #facc15; color: #000; }
        .badge-confirmed { background: #22c55e; color: #fff; }
        .badge-cancelled { background: #ef4444; color: #fff; }
        .fadeIn { animation: fIn 0.3s ease-in-out; }
        @keyframes fIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id='root'></div>
    <script type='text/babel'>
        const { useState, useEffect, useMemo } = React;

        const DEFAULT_SERVICES = {
            'Corte': { precio: 18000, duracion: 30 },
            'Barba': { precio: 8000, duracion: 30 },
            'Corte + Barba': { precio: 22000, duracion: 60 },
            'Colores': { precio: 75000, duracion: 30 }
        };

        const SLOTS = ['09:00','09:30','10:00','10:30','11:00','11:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'];
        const PAGOS = ['Efectivo', 'Transferencia', 'Mercado Pago', 'Tarjeta'];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [barberos, setBarberos] = useState(() => JSON.parse(localStorage.getItem('barberos_v1')) || ['Gonzalo Lavi', 'Pablo Lisandro']);
            const [servicios, setServicios] = useState(() => JSON.parse(localStorage.getItem('servicios_v1')) || DEFAULT_SERVICES);
            const [turnos, setTurnos] = useState(() => JSON.parse(localStorage.getItem('turnos_v1')) || []);
            const [clientes, setClientes] = useState(() => JSON.parse(localStorage.getItem('clientes_v1')) || []);

            useEffect(() => {
                localStorage.setItem('barberos_v1', JSON.stringify(barberos));
                localStorage.setItem('servicios_v1', JSON.stringify(servicios));
                localStorage.setItem('turnos_v1', JSON.stringify(turnos));
                localStorage.setItem('clientes_v1', JSON.stringify(clientes));
            }, [barberos, servicios, turnos, clientes]);

            const [form, setForm] = useState({ cliente: '', tel: '', ig: '', cumple: '', barbero: barberos[0], servicio: 'Corte', fecha: new Date().toISOString().split('T')[0], hora: '', estado: 'Confirmado', nota: '', pago: 'Efectivo' });

            const stats = useMemo(() => {
                const hoy = new Date().toISOString().split('T')[0];
                const d = new Date();
                const weekStart = new Date(d.setDate(d.getDate() - d.getDay())).toISOString().split('T')[0];
                const monthStart = hoy.substring(0, 7);

                const filterT = (arr, start) => arr.filter(t => t.fecha >= start && t.estado !== 'Cancelado');
                const sum = (arr) => arr.reduce((a, b) => a + b.monto, 0);

                const tHoy = turnos.filter(t => t.fecha === hoy && t.estado !== 'Cancelado');
                const tSemana = turnos.filter(t => t.fecha >= weekStart && t.estado !== 'Cancelado');
                const tMes = turnos.filter(t => t.fecha.startsWith(monthStart) && t.estado !== 'Cancelado');

                const pagosCount = turnos.reduce((acc, t) => {
                    if(t.estado !== 'Cancelado') acc[t.pago] = (acc[t.pago] || 0) + t.monto;
                    return acc;
                }, {});

                const servCount = turnos.reduce((acc, t) => {
                    if(t.estado !== 'Cancelado') acc[t.servicio] = (acc[t.servicio] || 0) + 1;
                    return acc;
                }, {});

                return {
                    diaria: sum(tHoy),
                    semanal: sum(tSemana),
                    mensual: sum(tMes),
                    count: tHoy.length,
                    pagos: pagosCount,
                    topServicio: Object.entries(servCount).sort((a,b) => b[1] - a[1])[0]?.[0] || 'N/A'
                };
            }, [turnos]);

            const handleAddTurno = (e) => {
                e.preventDefault();
                if(!form.cliente || !form.hora) return alert('Cliente y Hora son obligatorios');
                
                const monto = servicios[form.servicio].precio;
                const nuevoTurno = { ...form, id: Date.now(), monto };
                
                setTurnos([...turnos, nuevoTurno]);

                const index = clientes.findIndex(c => c.nombre.toLowerCase() === form.cliente.toLowerCase());
                if (index === -1) {
                    setClientes([...clientes, { 
                        nombre: form.cliente, 
                        tel: form.tel, 
                        ig: form.ig, 
                        cumple: form.cumple,
                        visitas: 1,
                        gastado: monto,
                        ultima: form.fecha
                    }]);
                } else {
                    const newClientes = [...clientes];
                    newClientes[index].visitas += 1;
                    newClientes[index].gastado += monto;
                    newClientes[index].ultima = form.fecha;
                    setClientes(newClientes);
                }

                setForm({ ...form, cliente: '', tel: '', ig: '', cumple: '', hora: '', nota: '' });
                alert('¡Turno agendado!');
            };

            return (
                <div className='max-w-md mx-auto p-4'>
                    <header className='mb-6 flex justify-between items-end'>
                        <div>
                            <h1 className='text-4xl font-black italic tracking-tighter leading-none'>BARBER<span className='accent'>OS</span></h1>
                            <p className='text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]'>Master Version 1.0</p>
                        </div>
                        <div className='text-right'>
                            <p className='text-[9px] font-black text-gray-600 uppercase'>Caja Hoy</p>
                            <p className='text-2xl font-black accent'>${stats.diaria.toLocaleString()}</p>
                        </div>
                    </header>

                    {tab === 'dashboard' && (
                        <div className='fadeIn space-y-4'>
                            <div className='grid grid-cols-1 gap-3'>
                                <div className='card flex justify-between items-center'>
                                    <div><p className='text-[10px] font-bold text-gray-500 uppercase'>Semanal</p><p className='text-2xl font-black'>${stats.semanal.toLocaleString()}</p></div>
                                    <div className='text-right'><p className='text-[10px] font-bold text-gray-500 uppercase'>Mensual</p><p className='text-2xl font-black'>${stats.mensual.toLocaleString()}</p></div>
                                </div>
                                <div className='grid grid-cols-2 gap-3'>
                                    <div className='card text-center'><p className='text-[10px] font-bold text-gray-500 uppercase'>Turnos Hoy</p><p className='text-3xl font-black accent'>{stats.count}</p></div>
                                    <div className='card text-center'><p className='text-[10px] font-bold text-gray-500 uppercase'>Top Servicio</p><p className='text-sm font-black uppercase mt-2'>{stats.topServicio}</p></div>
                                </div>
                            </div>
                            <div className='card'>
                                <h3 className='text-[10px] font-bold text-gray-500 uppercase mb-3'>Facturación por Pago</h3>
                                <div className='space-y-2'>
                                    {PAGOS.map(p => (
                                        <div key={p} className='flex justify-between text-xs'>
                                            <span className='font-bold text-gray-400'>{p}</span>
                                            <span className='font-black'>${(stats.pagos[p] || 0).toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'agenda' && (
                        <div className='fadeIn space-y-6'>
                            <form onSubmit={handleAddTurno} className='card space-y-3 text-left'>
                                <h2 className='text-xs font-black accent uppercase italic'>Nuevo Turno</h2>
                                <div className='grid grid-cols-1 gap-2'>
                                    <input placeholder='Nombre del Cliente' value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
                                    <div className='grid grid-cols-2 gap-2'>
                                        <input placeholder='WhatsApp' type='tel' value={form.tel} onChange={e => setForm({...form, tel: e.target.value})} />
                                        <input placeholder='Instagram' value={form.ig} onChange={e => setForm({...form, ig: e.target.value})} />
                                    </div>
                                </div>
                                <div className='grid grid-cols-2 gap-2'>
                                    <input type='date' value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                    <select value={form.barbero} onChange={e => setForm({...form, barbero: e.target.value})}>
                                        {barberos.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                                <div className='grid grid-cols-2 gap-2'>
                                    <select value={form.servicio} onChange={e => setForm({...form, servicio: e.target.value})}>
                                        {Object.keys(servicios).map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    <select value={form.pago} onChange={e => setForm({...form, pago: e.target.value})}>
                                        {PAGOS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                                <div className='grid grid-cols-5 gap-1 py-1'>
                                    {SLOTS.map(h => {
                                        const ocupado = turnos.some(t => t.fecha === form.fecha && t.hora === h && t.barbero === form.barbero && t.estado !== 'Cancelado');
                                        return <button key={h} type='button' onClick={() => setForm({...form, hora: h})} className={'slot ' + (ocupado ? 'occupied' : (form.hora === h ? 'selected' : 'available'))}>{h}</button>;
                                    })}
                                </div>
                                <textarea placeholder='Observaciones...' rows='2' value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                <button type='submit' className='btn-main'>Confirmar Turno</button>
                            </form>

                            <div className='space-y-3 text-left'>
                                <h3 className='text-[10px] font-black text-gray-500 uppercase'>Próximos Turnos ({form.fecha})</h3>
                                {turnos.filter(t => t.fecha === form.fecha).sort((a,b) => a.hora.localeCompare(b.hora)).map(t => (
                                    <div key={t.id} className='card border-l-4' style={{borderColor: t.estado === 'Confirmado' ? '#22c55e' : (t.estado === 'Pendiente' ? '#facc15' : '#ef4444')}}>
                                        <div className='flex justify-between items-start'>
                                            <div>
                                                <div className='flex items-center gap-2'>
                                                    <span className='font-black uppercase text-sm'>{t.cliente}</span>
                                                    <span className={`badge badge-${t.estado.toLowerCase()}`}>{t.estado}</span>
                                                </div>
                                                <p className='text-[10px] text-gray-500 font-bold mt-1'>{t.hora} hs | {t.barbero} | {t.servicio}</p>
                                                {t.nota && <p className='text-[10px] text-gray-400 italic mt-1'>"{t.nota}"</p>}
                                            </div>
                                            <div className='text-right'>
                                                <p className='font-black text-xs'>${t.monto.toLocaleString()}</p>
                                                <select className='mt-2 !p-1 !text-[9px] !w-24' value={t.estado} onChange={(e) => {
                                                    const newTurnos = turnos.map(x => x.id === t.id ? {...x, estado: e.target.value} : x);
                                                    setTurnos(newTurnos);
                                                }}>
                                                    <option value='Confirmado'>Confirmado</option>
                                                    <option value='Pendiente'>Pendiente</option>
                                                    <option value='Cancelado'>Cancelado</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'clientes' && (
                        <div className='fadeIn space-y-4 text-left'>
                            <div className='card'>
                                <h2 className='text-xs font-black accent uppercase mb-4'>Base de Clientes</h2>
                                <div className='divide-y divide-gray-800'>
                                    {clientes.sort((a,b) => b.visitas - a.visitas).map((c, i) => (
                                        <div key={i} className='py-4'>
                                            <div className='flex justify-between items-center'>
                                                <span className='font-black uppercase'>{c.nombre}</span>
                                                <span className='text-[10px] bg-gray-800 px-2 py-1 rounded font-bold text-gray-400'>{c.visitas} Visitas</span>
                                            </div>
                                            <div className='flex justify-between text-[10px] text-gray-500 mt-1 font-bold uppercase'>
                                                <span>WhatsApp: {c.tel || 'N/A'}</span>
                                                <span>Total: ${c.gastado.toLocaleString()}</span>
                                            </div>
                                            <p className='text-[9px] text-gray-600 mt-1 uppercase'>Última visita: {c.ultima}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'config' && (
                        <div className='fadeIn space-y-6 text-left'>
                            <div className='card space-y-4'>
                                <h2 className='text-xs font-black accent uppercase italic'>Configurar Barberos</h2>
                                <div className='space-y-2'>
                                    {barberos.map((b, i) => (
                                        <div key={i} className='flex gap-2'>
                                            <input value={b} onChange={(e) => {
                                                const newB = [...barberos];
                                                newB[i] = e.target.value;
                                                setBarberos(newB);
                                            }} />
                                            <button onClick={() => setBarberos(barberos.filter((_, idx) => idx !== i))} className='bg-red-900/30 text-red-500 p-3 rounded-xl border border-red-900'>✖</button>
                                        </div>
                                    ))}
                                    <button onClick={() => setBarberos([...barberos, 'Nuevo Barbero'])} className='text-[10px] font-black uppercase text-gray-400 border border-dashed border-gray-700 w-full py-3 rounded-xl'>+ Agregar Barbero</button>
                                </div>
                            </div>

                            <div className='card space-y-4'>
                                <h2 className='text-xs font-black accent uppercase italic'>Editar Precios</h2>
                                {Object.keys(servicios).map(s => (
                                    <div key={s} className='flex items-center gap-3 justify-between'>
                                        <span className='text-xs font-bold uppercase text-gray-400 w-24'>{s}</span>
                                        <input type='number' className='text-right !w-32' value={servicios[s].precio} onChange={(e) => {
                                            setServicios({...servicios, [s]: {...servicios[s], precio: Number(e.target.value)}});
                                        }} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <nav className='fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-md border-t border-gray-900 p-4 flex justify-between items-center z-50'>
                        <button onClick={() => setTab('dashboard')} className={'nav-btn' + (tab === 'dashboard' ? ' active' : '')}><span className='text-xl'>📊</span><span>Caja</span></button>
                        <button onClick={() => setTab('agenda')} className={'nav-btn' + (tab === 'agenda' ? ' active' : '')}><span className='text-xl'>📅</span><span>Turnos</span></button>
                        <button onClick={() => setTab('clientes')} className={'nav-btn' + (tab === 'clientes' ? ' active' : '')}><span className='text-xl'>👥</span><span>Clientes</span></button>
                        <button onClick={() => setTab('config')} className={'nav-btn' + (tab === 'config' ? ' active' : '')}><span className='text-xl'>⚙️</span><span>Ajustes</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
